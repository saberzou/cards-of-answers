<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cards of Answers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #e8641e;
    --accent-light: #e8b020;
    --accent-dim: #b04810;
    --crimson: #cc2828;
    --charcoal: #2a2a2a;
    --cream: #f0ebe0;
    --grey: #9a9590;
    --bg: #141414;
    --bg-deep: #0a0a0a;
    --card-w: 200px;
    --card-h: 280px;
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  /* --- Header --- */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
  }

  /* --- Shuffle button --- */
  .shuffle-btn {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cream);
    background: transparent;
    border: 1px solid rgba(240,235,224,0.2);
    border-radius: 40px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.4s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .shuffle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 30px rgba(232,100,30,0.15);
  }
  .shuffle-btn:active {
    transform: translateX(-50%) scale(0.96);
  }
  .shuffle-btn.disabled {
    pointer-events: none;
    opacity: 0.3;
  }

  /* --- Card stage --- */
  .card-stage {
    position: fixed;
    inset: 0;
    z-index: 10;
  }

  /* --- Cards --- */
  .card-wrapper {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    cursor: pointer;
    perspective: 800px;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }
  .card-wrapper.picking {
    z-index: 50 !important;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }

  /* Card back */
  .card-back {
    background: var(--cream);
    border: 1.5px solid rgba(154,149,144,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .card-back-orange {
    background: var(--accent);
  }
  .card-back-orange .card-symbol,
  .card-back-orange .card-corner {
    color: var(--cream);
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(232,100,30,0.2);
    border-radius: 7px;
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(232,176,32,0.15);
    border-radius: 5px;
  }
  .card-symbol {
    font-size: 48px;
    color: var(--accent);
    opacity: 0.8;
    filter: drop-shadow(0 0 8px rgba(232,100,30,0.3));
    z-index: 1;
  }
  .card-corner {
    position: absolute;
    font-family: 'DM Serif Display', serif;
    font-size: 10px;
    color: var(--accent-light);
    opacity: 0.5;
  }
  .card-corner.tl { top: 14px; left: 14px; }
  .card-corner.br { bottom: 14px; right: 14px; transform: rotate(180deg); }

  /* Card front */
  .card-front {
    background: var(--cream);
    border: 1.5px solid var(--accent);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    color: var(--charcoal);
    z-index: 2;
  }
  .card-category {
    font-family: 'DM Serif Display', serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 12px;
  }
  .card-front-symbol {
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .card-answer {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    color: var(--charcoal);
    font-style: italic;
  }
  .card-number {
    position: absolute;
    bottom: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    color: var(--grey);
    opacity: 0.5;
  }

  /* Snow background */
  #snowCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ========== MOBILE ========== */
  @media (max-width: 768px) {
    :root {
      --card-w: 120px;
      --card-h: 170px;
    }
    .header { padding: 16px 16px; }
    .logo { font-size: 12px; }
    .shuffle-btn { bottom: 32px; font-size: 11px; padding: 12px 32px; }
    .card-symbol { font-size: 28px; }
    .card-corner { font-size: 7px; }
    .card-corner.tl { top: 8px; left: 8px; }
    .card-corner.br { bottom: 8px; right: 8px; }
    .card-back::before { inset: 4px; }
    .card-back::after { inset: 7px; }
    .card-answer { font-size: 10px; line-height: 1.4; }
    .card-category { font-size: 6px; margin-bottom: 6px; }
    .card-number { font-size: 7px; bottom: 8px; }
    .card-front { padding: 12px 8px; }
    .card-front-symbol { font-size: 24px; }
  }

  @media (max-width: 480px) {
    :root {
      --card-w: 100px;
      --card-h: 142px;
    }
    .card-symbol { font-size: 22px; }
    .card-corner { font-size: 6px; }
    .card-back::before { inset: 3px; }
    .card-back::after { inset: 5px; }
    .card-answer { font-size: 8px; }
    .card-category { font-size: 5px; margin-bottom: 4px; }
    .card-front { padding: 8px 6px; }
    .card-front-symbol { font-size: 18px; }
  }
</style>
</head>
<body>

<div id="snowCanvas"></div>

<div class="header">
  <div class="logo">Cards of Answers</div>
</div>

<div class="card-stage" id="cardStage"></div>

<button class="shuffle-btn" id="shuffleBtn">Shuffle</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const ANSWERS = [
  { category: "Courage", answer: "The thing you fear most is exactly what you must do.", symbol: "♠" },
  { category: "Patience", answer: "Not yet. But soon.", symbol: "♣" },
  { category: "Truth", answer: "You already know the answer. Trust it.", symbol: "♦" },
  { category: "Change", answer: "What you're holding onto is holding you back.", symbol: "♥" },
  { category: "Love", answer: "Open the door you keep pretending is locked.", symbol: "♥" },
  { category: "Action", answer: "Stop planning. Start.", symbol: "♠" },
  { category: "Wisdom", answer: "The teacher appears when the student is ready.", symbol: "♣" },
  { category: "Solitude", answer: "Being alone is not the same as being lonely.", symbol: "♦" },
  { category: "Fate", answer: "This was always going to happen.", symbol: "♠" },
  { category: "Hope", answer: "The darkest hour is just before dawn.", symbol: "♥" },
  { category: "Doubt", answer: "Your doubt is not protecting you — it is limiting you.", symbol: "♣" },
  { category: "Growth", answer: "Discomfort is the price of a meaningful life.", symbol: "♦" },
  { category: "Time", answer: "It's not too late. It's never too late.", symbol: "♠" },
  { category: "Joy", answer: "Happiness is not found. It is created.", symbol: "♥" },
  { category: "Focus", answer: "Do less. But do it completely.", symbol: "♣" },
  { category: "Release", answer: "Forgive them. Not for them — for you.", symbol: "♦" },
  { category: "Risk", answer: "The biggest risk is not taking one.", symbol: "♠" },
  { category: "Rest", answer: "You are not lazy. You are exhausted. Rest.", symbol: "♥" },
  { category: "Connection", answer: "Call the person you've been thinking about.", symbol: "♣" },
  { category: "Clarity", answer: "Simplify. Then simplify again.", symbol: "♦" },
  { category: "Acceptance", answer: "Let it be what it is.", symbol: "♥" },
  { category: "Ambition", answer: "Dream bigger. You're playing too small.", symbol: "♠" },
  { category: "Gratitude", answer: "Look at what you have. Really look.", symbol: "♣" },
  { category: "Mystery", answer: "Not everything needs to be understood.", symbol: "♦" },
];

const SYMBOLS = ["✦", "◈", "✧", "⬥", "❖", "☽", "✶", "⊕"];
const CARD_COUNT = ANSWERS.length;

// State
let state = 'deck'; // deck | shuffling | fanned | picking | returning
let cards = [];
let cardEls = [];
let pickedIndex = -1;
let deckOrder = []; // shuffled indices

const stage = document.getElementById('cardStage');
const shuffleBtn = document.getElementById('shuffleBtn');

// --- Card creation ---
function createCardEl(index) {
  const answer = ANSWERS[index];
  const sym = SYMBOLS[index % SYMBOLS.length];
  const num = String(index + 1).padStart(2, '0');
  const isBlack = answer.symbol === '♠' || answer.symbol === '♣';

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.dataset.index = index;

  wrapper.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back${isBlack ? ' card-back-orange' : ''}">
        <span class="card-corner tl">${answer.symbol}</span>
        <span class="card-symbol">${sym}</span>
        <span class="card-corner br">${answer.symbol}</span>
      </div>
      <div class="card-face card-front">
        <span class="card-front-symbol">${sym}</span>
        <span class="card-category">${answer.category}</span>
        <span class="card-answer">"${answer.answer}"</span>
        <span class="card-number">${num}</span>
      </div>
    </div>
  `;

  wrapper.addEventListener('click', () => onCardClick(index));
  return wrapper;
}

function init() {
  // Create all card elements
  for (let i = 0; i < CARD_COUNT; i++) {
    const el = createCardEl(i);
    stage.appendChild(el);
    cardEls.push(el);
    deckOrder.push(i);
  }
  // Position as deck
  positionAsDeck(false);
  initSnow();
}

// --- Deck position (stacked center) ---
function positionAsDeck(animate) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));

  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const offsetY = -order * 0.4;
    const offsetX = (Math.random() - 0.5) * 1.5;
    const rot = (Math.random() - 0.5) * 2;

    el.classList.remove('flipped', 'picking');
    el.style.zIndex = order;
    el.style.transition = animate ? `transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) ${order * 15}ms` : 'none';
    el.style.transform = `translate(${cx - cw/2 + offsetX}px, ${cy - ch/2 + offsetY}px) rotate(${rot}deg)`;
    el.style.opacity = '1';
    el.style.pointerEvents = 'none';
  });

  state = 'deck';
}

// --- Shuffle animation ---
function shuffleDeck() {
  if (state === 'shuffling') return;
  state = 'shuffling';
  shuffleBtn.classList.add('disabled');

  // If fanned, gather back first
  if (pickedIndex >= 0) {
    // Close picked card first
    cardEls[pickedIndex].classList.remove('flipped', 'picking');
    pickedIndex = -1;
  }

  const gatherDuration = state === 'deck' ? 0 : 500;

  // Gather cards to center
  positionAsDeck(true);

  setTimeout(() => {
    doRiffles(0, 3, () => {
      // Shuffle the order
      for (let i = deckOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deckOrder[i], deckOrder[j]] = [deckOrder[j], deckOrder[i]];
      }
      // Fan out
      setTimeout(() => fanOut(), 200);
    });
  }, gatherDuration + 300);
}

function doRiffles(count, total, callback) {
  if (count >= total) { callback(); return; }

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
  const half = Math.floor(CARD_COUNT / 2);

  // Split left/right
  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const isLeft = order < half;
    const spread = isLeft ? -60 : 60;
    const lift = -20 - Math.random() * 10;
    const rot = isLeft ? -8 : 8;

    el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1)';
    el.style.transform = `translate(${cx - cw/2 + spread}px, ${cy - ch/2 + lift}px) rotate(${rot}deg)`;
  });

  // Interleave back
  setTimeout(() => {
    // Interleave deckOrder
    const left = deckOrder.slice(0, half);
    const right = deckOrder.slice(half);
    const merged = [];
    let li = 0, ri = 0;
    while (li < left.length || ri < right.length) {
      if (ri < right.length) merged.push(right[ri++]);
      if (li < left.length) merged.push(left[li++]);
    }
    deckOrder.length = 0;
    merged.forEach(v => deckOrder.push(v));

    cardEls.forEach((el, i) => {
      const order = deckOrder.indexOf(i);
      const offsetY = -order * 0.4;
      el.style.zIndex = order;
      el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1)';
      el.style.transform = `translate(${cx - cw/2}px, ${cy - ch/2 + offsetY}px) rotate(${(Math.random()-0.5)*2}deg)`;
    });

    setTimeout(() => doRiffles(count + 1, total, callback), 220);
  }, 200);
}

// --- Orbit ring ---
let orbitAngle = 0; // current rotation in radians
let orbitRAF = null;
const ORBIT_SPEED = 0.12; // radians per second — slow, meditative

function getOrbitParams() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
  // Ellipse: wide, slightly tilted for perspective
  const isMobile = w <= 768;
  const rx = isMobile ? w * 0.62 : Math.min(w * 0.42, 620);
  const ry = rx * (isMobile ? 0.38 : 0.32);
  const cx = w / 2 - cw / 2;
  const cy = h / 2 - ch / 2 - 10;
  return { rx, ry, cx, cy, cw, ch };
}

function cardOrbitPos(order, n, angle, params) {
  // Compensate for perspective: spread cards more at front, tighter at back
  const t = order / n;
  const theta = angle + (t + 0.06 * Math.sin(t * Math.PI * 2)) * Math.PI * 2;
  const x = params.cx + Math.cos(theta) * params.rx;
  const y = params.cy + Math.sin(theta) * params.ry;
  const depth = Math.sin(theta); // -1 (back) to 1 (front)
  // Scale slightly by depth for perspective
  const scale = 0.75 + depth * 0.25;
  const rot = Math.cos(theta) * -6; // tilt cards along orbit
  const z = Math.round((depth + 1) * 100); // zIndex
  return { x, y, scale, rot, z, depth };
}

function fanOut() {
  orbitAngle = 0;
  state = 'fanned';
  shuffleBtn.classList.remove('disabled');

  // Initial position with transition
  const params = getOrbitParams();
  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);
    el.style.transition = `transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${order * 20}ms, opacity 0.4s ease`;
    el.style.zIndex = pos.z;
    el.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${pos.rot}deg) scale(${pos.scale})`;
    el.style.opacity = '1';
    el.style.pointerEvents = 'auto';
  });

  // Start orbit after transition settles
  setTimeout(() => startOrbit(), 900);
}

function startOrbit() {
  if (orbitRAF) cancelAnimationFrame(orbitRAF);
  let lastTime = performance.now();

  function tick(now) {
    if (state !== 'fanned') return;
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    orbitAngle += dt * ORBIT_SPEED;

    const params = getOrbitParams();
    cardEls.forEach((el, i) => {
      if (i === pickedIndex) return;
      const order = deckOrder.indexOf(i);
      const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);
      el.style.transition = 'none';
      el.style.zIndex = pos.z;
      el.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${pos.rot}deg) scale(${pos.scale})`;
      el.style.filter = `drop-shadow(0 ${4 + pos.depth * 8}px ${10 + pos.depth * 12}px rgba(0,0,0,${(0.25 + pos.depth * 0.2).toFixed(2)}))`;
      el.style.opacity = '1';
    });

    orbitRAF = requestAnimationFrame(tick);
  }
  orbitRAF = requestAnimationFrame(tick);
}

// --- Card interaction ---
function onCardClick(index) {
  if (state === 'fanned' && pickedIndex < 0) {
    pickCard(index);
  } else if (state === 'fanned' && pickedIndex === index) {
    // Flip the picked card
    cardEls[index].classList.toggle('flipped');
  } else if (state === 'fanned' && pickedIndex >= 0 && pickedIndex !== index) {
    // Put back current, pick new
    putBackCard(() => pickCard(index));
  }
}

function pickCard(index) {
  pickedIndex = index;
  state = 'fanned'; // still fanned, just one is picked

  const el = cardEls[index];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));

  // Scale up and center
  const scale = Math.min(window.innerWidth / cw * 0.35, 2);
  el.classList.add('picking');
  el.style.zIndex = 999;
  el.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
  el.style.transform = `translate(${cx - cw/2}px, ${cy - ch/2 - ch * 0.6}px) scale(${scale}) rotate(0deg)`;

  // Dim other cards
  cardEls.forEach((other, i) => {
    if (i !== index) {
      other.style.transition = 'opacity 0.4s ease';
      other.style.opacity = '0.3';
      other.style.pointerEvents = 'none';
    }
  });

  // Auto-flip after pop
  setTimeout(() => {
    el.classList.add('flipped');
  }, 350);

  // Click outside to close
  const closeHandler = (e) => {
    if (el.contains(e.target)) return;
    document.removeEventListener('click', closeHandler);
    putBackCard();
  };
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
}

function putBackCard(callback) {
  if (pickedIndex < 0) { if (callback) callback(); return; }

  const el = cardEls[pickedIndex];
  const order = deckOrder.indexOf(pickedIndex);
  const params = getOrbitParams();
  const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);

  el.classList.remove('flipped', 'picking');
  el.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
  el.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${pos.rot}deg) scale(${pos.scale})`;
  el.style.zIndex = pos.z;

  // Restore other cards
  cardEls.forEach((other) => {
    other.style.transition = 'opacity 0.3s ease';
    other.style.opacity = '1';
    other.style.pointerEvents = 'auto';
  });

  pickedIndex = -1;

  setTimeout(() => { if (callback) callback(); }, 500);
}

// --- Shuffle button ---
shuffleBtn.addEventListener('click', () => {
  if (pickedIndex >= 0) {
    putBackCard(() => setTimeout(shuffleDeck, 200));
  } else {
    shuffleDeck();
  }
});

// --- Resize ---
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state === 'fanned') {
      // Orbit auto-adapts via getOrbitParams() each frame
    } else if (state === 'deck') {
      positionAsDeck(false);
    }
  }, 200);
});

// --- Snow shader (same as before) ---
function initSnow() {
  const container = document.getElementById('snowCanvas');
  const { Scene, OrthographicCamera, WebGLRenderer, PlaneGeometry, ShaderMaterial, Mesh, Vector2 } = THREE;

  const scene = new Scene();
  const camera = new OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const renderer = new WebGLRenderer({ antialias: false, alpha: true, premultipliedAlpha: false, powerPreference: 'high-performance', stencil: false, depth: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
  const fragmentShader = `
precision mediump float;
out vec4 fragColor;
uniform float uTime;
uniform vec2 uResolution;
uniform float uFlakeSize;
uniform float uMinFlakeSize;
uniform float uPixelResolution;
uniform float uSpeed;
uniform float uDepthFade;
uniform float uFarPlane;
uniform vec3 uColor;
uniform float uBrightness;
uniform float uGamma;
uniform float uDensity;
uniform float uDirection;

#define PI 3.14159265
#define M1 1597334677U
#define M2 3812015801U
#define M3 3299493293U
#define F0 2.3283064e-10
#define hash(n) (n * (n ^ (n >> 15)))
#define coord3(p) (uvec3(p).x * M1 ^ uvec3(p).y * M2 ^ uvec3(p).z * M3)

const vec3 camK = vec3(0.57735027, 0.57735027, 0.57735027);
const vec3 camI = vec3(0.70710678, 0.0, -0.70710678);
const vec3 camJ = vec3(-0.40824829, 0.81649658, -0.40824829);

vec3 hash3(uint n) {
  uvec3 hashed = hash(n) * uvec3(1U, 511U, 262143U);
  return vec3(hashed) * F0;
}

void main() {
  float invPixelRes = 1.0 / uPixelResolution;
  float pixelSize = max(1.0, floor(0.5 + uResolution.x * invPixelRes));
  float invPixelSize = 1.0 / pixelSize;
  vec2 fragCoord = floor(gl_FragCoord.xy * invPixelSize);
  vec2 res = uResolution * invPixelSize;
  float invResX = 1.0 / res.x;
  vec3 ray = normalize(vec3((fragCoord - res * 0.5) * invResX, 1.0));
  ray = ray.x * camI + ray.y * camJ + ray.z * camK;
  float timeSpeed = uTime * uSpeed;
  float windX = cos(uDirection) * 0.4;
  float windY = sin(uDirection) * 0.4;
  vec3 camPos = (windX * camI + windY * camJ + 0.1 * camK) * timeSpeed;
  vec3 pos = camPos;
  vec3 absRay = max(abs(ray), vec3(0.001));
  vec3 strides = 1.0 / absRay;
  vec3 raySign = step(ray, vec3(0.0));
  vec3 phase = fract(pos) * strides;
  phase = mix(strides - phase, phase, raySign);
  float rayDotCamK = dot(ray, camK);
  float invRayDotCamK = 1.0 / rayDotCamK;
  float invDepthFade = 1.0 / uDepthFade;
  float halfInvResX = 0.5 * invResX;
  vec3 timeAnim = timeSpeed * 0.1 * vec3(7.0, 8.0, 5.0);
  float t = 0.0;
  for (int i = 0; i < 128; i++) {
    if (t >= uFarPlane) break;
    vec3 fpos = floor(pos);
    uint cellCoord = coord3(fpos);
    float cellHash = hash3(cellCoord).x;
    if (cellHash < uDensity) {
      vec3 h = hash3(cellCoord);
      vec3 sinArg1 = fpos.yzx * 0.073;
      vec3 sinArg2 = fpos.zxy * 0.27;
      vec3 flakePos = 0.5 - 0.5 * cos(4.0 * sin(sinArg1) + 4.0 * sin(sinArg2) + 2.0 * h + timeAnim);
      flakePos = flakePos * 0.8 + 0.1 + fpos;
      float toIntersection = dot(flakePos - pos, camK) * invRayDotCamK;
      if (toIntersection > 0.0) {
        vec3 testPos = pos + ray * toIntersection - flakePos;
        float testX = dot(testPos, camI);
        float testY = dot(testPos, camJ);
        vec2 testUV = abs(vec2(testX, testY));
        float depth = dot(flakePos - camPos, camK);
        float flakeSize = max(uFlakeSize, uMinFlakeSize * depth * halfInvResX);
        float dist = max(testUV.x, testUV.y);
        if (dist < flakeSize) {
          float flakeSizeRatio = uFlakeSize / flakeSize;
          float intensity = exp2(-(t + toIntersection) * invDepthFade) * min(1.0, flakeSizeRatio * flakeSizeRatio) * uBrightness;
          fragColor = vec4(uColor * pow(vec3(intensity), vec3(uGamma)), 1.0);
          return;
        }
      }
    }
    float nextStep = min(min(phase.x, phase.y), phase.z);
    vec3 sel = step(phase, vec3(nextStep));
    phase = phase - nextStep + strides * sel;
    t += nextStep;
    pos = mix(pos + ray * nextStep, floor(pos + ray * nextStep + 0.5), sel);
  }
  fragColor = vec4(0.0);
}`;

  const material = new ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uResolution: { value: new Vector2(window.innerWidth, window.innerHeight) },
      uFlakeSize: { value: 0.01 },
      uMinFlakeSize: { value: 1.25 },
      uPixelResolution: { value: 200 },
      uSpeed: { value: 1.25 },
      uDepthFade: { value: 8 },
      uFarPlane: { value: 20 },
      uColor: { value: new THREE.Vector3(0.91, 0.39, 0.12) },
      uBrightness: { value: 1 },
      uGamma: { value: 0.4545 },
      uDensity: { value: 0.3 },
      uDirection: { value: (125 * Math.PI) / 180 }
    },
    transparent: true,
    glslVersion: THREE.GLSL3
  });

  const geometry = new PlaneGeometry(2, 2);
  scene.add(new Mesh(geometry, material));

  const startTime = performance.now();
  function snowAnimate() {
    material.uniforms.uTime.value = (performance.now() - startTime) * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(snowAnimate);
  }
  snowAnimate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && pickedIndex >= 0) {
    putBackCard();
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    shuffleBtn.click();
  }
});

init();
</script>
