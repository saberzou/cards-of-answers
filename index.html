<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cards of Answers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Goudy+Bookletter+1911&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #e8641e;
    --accent-light: #e8b020;
    --accent-dim: #b04810;
    --crimson: #cc2828;
    --charcoal: #2a2a2a;
    --cream: #f0ebe0;
    --grey: #9a9590;
    --bg: #141414;
    --bg-deep: #0a0a0a;
    --card-w: 150px;
    --card-h: 210px;
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  /* --- Header --- */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 56px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  .logo {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--cream);
  }
  .site-intro {
    max-width: 240px;
    margin: 12px auto 0;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .site-intro.visible {
    opacity: 1;
  }
  .site-intro p {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--cream);
    opacity: 0.5;
    margin: 0;
  }

  /* --- Shuffle button --- */
  .shuffle-btn {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cream);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: none;
    border-radius: 40px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.4s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .shuffle-btn:hover {
    background: rgba(232, 100, 30, 0.15);
    color: var(--accent);
    box-shadow: none;
  }
  .shuffle-btn:active {
    transform: translateX(-50%) scale(0.96);
  }
  .shuffle-btn.disabled {
    pointer-events: none;
    opacity: 0.3;
  }

  /* --- Card stage --- */
  .card-stage {
    position: fixed;
    inset: 0;
  }

  /* --- Cards --- */
  .card-wrapper {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    cursor: pointer;
    perspective: 800px;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
    contain: layout style paint;
  }
  .card-wrapper.picking {
    z-index: 2000 !important;
    filter: none !important;
    opacity: 1 !important;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
    contain: layout style paint;
  }

  /* Card back */
  .card-back {
    background: var(--cream);
    border: 1.5px solid rgba(154,149,144,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 8px;
  }
  .card-back-orange {
    background-color: var(--accent);
  }
  .card-back-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 5px;
  }
  .card-back-orange .card-symbol,
  .card-back-orange .card-corner {
    color: var(--cream);
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(232,100,30,0.2);
    border-radius: 7px;
    display: none;
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(232,176,32,0.15);
    border-radius: 5px;
    display: none;
  }
  .card-symbol {
    font-size: 64px;
    color: var(--accent);
    opacity: 0.8;
    filter: drop-shadow(0 0 8px rgba(232,100,30,0.3));
    z-index: 1;
    display: none;
  }
  .card-mandala {
    width: 80%;
    max-width: 140px;
    color: var(--accent);
    opacity: 1;
    z-index: 1;
    display: none;
  }
  .card-back-orange .card-mandala {
    color: rgba(90, 20, 0, 0.9);
  }
  .card-corner {
    position: absolute;
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 10px;
    color: var(--accent-light);
    opacity: 0.5;
    display: none;
  }
  .card-corner.tl { top: 14px; left: 14px; }
  .card-corner.br { bottom: 14px; right: 14px; transform: rotate(180deg); }

  /* Card front */
  .card-front {
    background: var(--cream);
    border: none;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px 32px;
    color: var(--charcoal);
    z-index: 2;
    overflow: hidden;
  }
  .card-watermark {
    position: absolute;
    inset: -50%;
    transform: rotate(-30deg);
    opacity: 0.04;
    pointer-events: none;
    background-repeat: repeat;
    background-size: 56px 56px;
    z-index: 0;
  }
  .card-front-symbol, .card-category, .card-answer {
    position: relative;
    z-index: 1;
  }
  }
  .card-category {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 12px;
  }
  .card-front-symbol {
    width: 32px;
    height: 32px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .card-front-symbol svg {
    width: 100%;
    height: 100%;
  }
  .card-answer {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    color: var(--charcoal);
    font-style: normal;
  }
  .card-number {
    position: absolute;
    bottom: 12px;
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 9px;
    color: var(--grey);
    opacity: 0.5;
  }

  /* --- Pick overlay --- */
  .pick-overlay {
    position: fixed;
    inset: 0;
    z-index: 1500;
    background: rgba(20,20,20,0.8);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .pick-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Snow background */
  #snowCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ========== MOBILE ========== */
  @media (max-width: 768px) {
    :root {
      --card-w: 120px;
      --card-h: 170px;
    }
    .header { padding: 16px 16px; }
    .logo { font-size: 24px; }
    .shuffle-btn { bottom: 32px; font-size: 11px; padding: 12px 32px; }
    .card-symbol { font-size: 44px; }
    .card-back { padding: 4px; }
    .card-corner { font-size: 7px; }
    .card-corner.tl { top: 8px; left: 8px; }
    .card-corner.br { bottom: 8px; right: 8px; }
    .card-back::before { inset: 4px; }
    .card-back::after { inset: 7px; }
    .card-answer { font-size: 10px; line-height: 1.4; }
    .card-category { font-size: 6px; margin-bottom: 6px; }
    .card-number { font-size: 7px; bottom: 8px; }
    .card-front { padding: 12px 8px; }
    .card-front-symbol { width: 24px; height: 24px; }
  }

  @media (max-width: 480px) {
    :root {
      --card-w: 100px;
      --card-h: 142px;
    }
    .card-symbol { font-size: 36px; }
    .card-corner { font-size: 6px; }
    .card-back::before { inset: 3px; }
    .card-back::after { inset: 5px; }
    .card-answer { font-size: 8px; }
    .card-category { font-size: 5px; margin-bottom: 4px; }
    .card-front { padding: 8px 6px; }
    .card-front-symbol { width: 18px; height: 18px; }
  }
  /* Loading screen */
  #loadingScreen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--charcoal);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.6s ease;
  }
  #loadingScreen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loader-cards {
    width: 80px;
    height: 110px;
    position: relative;
  }
  .loader-card {
    position: absolute;
    width: 50px;
    height: 72px;
    border-radius: 6px;
    background: var(--cream);
    border: 1.5px solid rgba(154,149,144,0.3);
    left: 50%;
    top: 50%;
    transform-origin: center;
  }
  .loader-card:nth-child(1) {
    animation: loaderShuffle1 1.2s ease-in-out infinite;
  }
  .loader-card:nth-child(2) {
    animation: loaderShuffle2 1.2s ease-in-out infinite;
  }
  .loader-card:nth-child(3) {
    animation: loaderShuffle3 1.2s ease-in-out infinite;
  }
  @keyframes loaderShuffle1 {
    0%, 100% { transform: translate(-50%, -50%) rotate(-8deg); z-index: 1; }
    33% { transform: translate(-50%, -70%) rotate(-20deg); z-index: 3; }
    66% { transform: translate(-50%, -50%) rotate(-8deg); z-index: 1; }
  }
  @keyframes loaderShuffle2 {
    0%, 100% { transform: translate(-50%, -50%) rotate(0deg); z-index: 2; }
    33% { transform: translate(-50%, -50%) rotate(0deg); z-index: 1; }
    66% { transform: translate(-50%, -30%) rotate(12deg); z-index: 3; }
  }
  @keyframes loaderShuffle3 {
    0%, 100% { transform: translate(-50%, -50%) rotate(6deg); z-index: 3; }
    33% { transform: translate(-50%, -50%) rotate(6deg); z-index: 2; }
    66% { transform: translate(-50%, -50%) rotate(6deg); z-index: 2; }
  }
  .loader-text {
    font-family: 'Goudy Bookletter 1911', serif;
    color: var(--cream);
    font-size: 14px;
    opacity: 0.5;
    letter-spacing: 2px;
  }
</style>
</head>

<div id="loadingScreen">
  <div class="loader-cards">

</div>

<div id="snowCanvas"></div>

<div class="card-stage" id="cardStage"></div>
<div class="pick-overlay" id="pickOverlay"></div>

<button class="shuffle-btn" id="shuffleBtn">Shuffle</button>

// Active deck — 24 randomly selected answers
let ANSWERS = ALL_ANSWERS.slice(0, 24);

function randomizeAnswers() {
  // Fisher-Yates shuffle on a copy, pick first 24
  const pool = [...ALL_ANSWERS];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  ANSWERS = pool.slice(0, 24);
  // Update card fronts
  cardEls.forEach((el, idx) => {
    const a = ANSWERS[idx];
    const sym = SYMBOLS[idx % SYMBOLS.length];
    const front = el.querySelector('.card-front');
    if (front) {
      front.querySelector('.card-front-symbol').innerHTML = CATEGORY_ICONS[a.category] || sym;
      front.querySelector('.card-category').textContent = a.category;
      front.querySelector('.card-answer').textContent = `"${a.answer}"`;
      const wm = front.querySelector('.card-watermark');
      if (wm) {
        wm.dataset.category = a.category;
        const svg = CATEGORY_ICONS[a.category];
        if (svg) wm.style.backgroundImage = `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
      }
    }
  });
}

// Seeded PRNG (mulberry32)
function seededRng(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Generative mandala — each card index produces a unique pattern
function generateMandala(index) {
  const rng = seededRng(index * 7919 + 137);
  const pick = (arr) => arr[Math.floor(rng() * arr.length)];
  const range = (lo, hi) => lo + rng() * (hi - lo);

  // Vary structure per card
  const numRings = Math.floor(range(2, 5));
  const numRays = pick([6, 8, 10, 12, 16]);
  const hasInnerPolygon = rng() > 0.4;
  const hasOrbitDots = rng() > 0.35;
  const hasPetals = rng() > 0.5;
  const hasDiamonds = rng() > 0.5;
  const rotOffset = range(0, 360);

  let paths = '';

  // Concentric rings at varied radii
  const ringRadii = Array.from({length: numRings}, (_, i) =>
    8 + (34 / (numRings - 1 || 1)) * i + range(-2, 2)
  ).sort((a, b) => a - b);

  ringRadii.forEach(r => {
    paths += `<circle cx="50" cy="50" r="${r.toFixed(1)}" opacity="${range(0.4, 0.65).toFixed(2)}"/>`;
  });

  // Center dot
  paths += `<circle cx="50" cy="50" r="${range(1.5, 3).toFixed(1)}" opacity="0.7" fill="currentColor" stroke="none"/>`;

  // Radiating rays
  const innerR = ringRadii[0] || 8;
  const outerR = ringRadii[ringRadii.length - 1] || 42;
  for (let i = 0; i < numRays; i++) {
    const a = (rotOffset + i * 360 / numRays) * Math.PI / 180;
    const x1 = 50 + innerR * Math.cos(a), y1 = 50 + innerR * Math.sin(a);
    const x2 = 50 + outerR * Math.cos(a), y2 = 50 + outerR * Math.sin(a);
    paths += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" opacity="${range(0.35, 0.55).toFixed(2)}"/>`;
  }

  // Inner polygon (triangle, square, pentagon, hexagon)
  if (hasInnerPolygon) {
    const sides = pick([3, 4, 5, 6]);
    const polyR = range(10, 18);
    const polyRot = range(0, 360);
    const pts = Array.from({length: sides}, (_, i) => {
      const a = (polyRot + i * 360 / sides) * Math.PI / 180;
      return `${(50 + polyR * Math.cos(a)).toFixed(1)},${(50 + polyR * Math.sin(a)).toFixed(1)}`;
    }).join(' ');
    paths += `<polygon points="${pts}" opacity="${range(0.4, 0.6).toFixed(2)}"/>`;
  }

  // Orbit dots
  if (hasOrbitDots) {
    const dotCount = pick([4, 6, 8]);
    const dotR = range(20, 32);
    const dotRot = range(0, 360);
    for (let i = 0; i < dotCount; i++) {
      const a = (dotRot + i * 360 / dotCount) * Math.PI / 180;
      const x = 50 + dotR * Math.cos(a), y = 50 + dotR * Math.sin(a);
      paths += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${range(1.5, 3).toFixed(1)}" opacity="${range(0.4, 0.6).toFixed(2)}"/>`;
    }
  }

  // Petal arcs
  if (hasPetals) {
    const petalCount = pick([4, 6, 8]);
    const petalR = range(14, 24);
    const petalRot = range(0, 360);
    for (let i = 0; i < petalCount; i++) {
      const a = (petalRot + i * 360 / petalCount) * Math.PI / 180;
      const a2 = (petalRot + i * 360 / petalCount + 30) * Math.PI / 180;
      const x1 = 50 + petalR * 0.5 * Math.cos(a), y1 = 50 + petalR * 0.5 * Math.sin(a);
      const cx1 = 50 + petalR * Math.cos((a + a2) / 2 + 0.3), cy1 = 50 + petalR * Math.sin((a + a2) / 2 + 0.3);
      const x2 = 50 + petalR * 0.5 * Math.cos(a2), y2 = 50 + petalR * 0.5 * Math.sin(a2);
      paths += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} Q${cx1.toFixed(1)},${cy1.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}" opacity="${range(0.35, 0.55).toFixed(2)}"/>`;
    }
  }

  // Diamond accents on outer ring
  if (hasDiamonds) {
    const dCount = pick([4, 6, 8]);
    const dR = range(32, 40);
    const dRot = range(0, 360);
    const dSize = range(2, 3.5);
    for (let i = 0; i < dCount; i++) {
      const a = (dRot + i * 360 / dCount) * Math.PI / 180;
      const x = 50 + dR * Math.cos(a), y = 50 + dR * Math.sin(a);
      paths += `<path d="M${(x-dSize).toFixed(1)},${y.toFixed(1)} L${x.toFixed(1)},${(y-dSize).toFixed(1)} L${(x+dSize).toFixed(1)},${y.toFixed(1)} L${x.toFixed(1)},${(y+dSize).toFixed(1)}Z" opacity="${range(0.4, 0.6).toFixed(2)}"/>`;
    }
  }

  return `<svg class="card-mandala" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.8">${paths}</svg>`;
}

const CARD_COUNT = ANSWERS.length;

// State
let state = 'deck'; // deck | shuffling | fanned | picking | returning
let cards = [];
let cardEls = [];
let pickedIndex = -1;
let deckOrder = []; // shuffled indices

const stage = document.getElementById('cardStage');
const shuffleBtn = document.getElementById('shuffleBtn');

// --- Card creation ---
function createCardEl(index) {
  const answer = ANSWERS[index];
  const sym = SYMBOLS[index % SYMBOLS.length];
  const num = String(index + 1).padStart(2, '0');
  const isBlack = answer.symbol === '♠' || answer.symbol === '♣';

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.dataset.index = index;

  wrapper.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back${isBlack ? ' card-back-orange' : ''}">
        <img class="card-back-img" src="${window._CARD_BACKS ? (window._CARD_BACKS[index] || window._CARD_BACKS[index % window._CARD_BACKS.length]) : ''}" alt="" loading="lazy">
      </div>
      <div class="card-face card-front">
        <div class="card-watermark" data-category="${answer.category}"></div>
        <span class="card-front-symbol">${CATEGORY_ICONS[answer.category] || sym}</span>
        <span class="card-category">${answer.category}</span>
        <span class="card-answer">"${answer.answer}"</span>
      </div>
    </div>
  `;

  wrapper.addEventListener('click', () => onCardClick(index));
  if (window.matchMedia('(pointer: fine)').matches) {
    wrapper.addEventListener('mouseenter', () => { orbitHovering = true; });
    wrapper.addEventListener('mouseleave', () => { orbitHovering = false; });
  }

  // Set watermark background from category icon SVG
  const wm = wrapper.querySelector('.card-watermark');
  const iconSvg = CATEGORY_ICONS[answer.category];
  if (wm && iconSvg) {
    const fullSvg = iconSvg
      .replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" ')
      .replace(/currentColor/g, '#c8b8a0');
    const b64 = btoa(fullSvg);
    wm.style.backgroundImage = `url("data:image/svg+xml;base64,${b64}")`;
  }

  return wrapper;
}

function init() {
  // Preload card back images, then reveal
  const CARD_BACKS = ['images/card-courage.webp', 'images/card-wisdom.webp', 'images/card-love.webp', 'images/card-mystery.webp',
    'images/card-patience.webp', 'images/card-truth.webp', 'images/card-change.webp', 'images/card-action.webp',

// --- Deck position (stacked center) ---
function positionAsDeck(animate) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));

  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const offsetY = -order * 0.4;
    const offsetX = (Math.random() - 0.5) * 1.5;
    const rot = (Math.random() - 0.5) * 2;

    el.classList.remove('flipped', 'picking');
    el.style.zIndex = order;
    el.style.transition = animate ? `transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) ${order * 15}ms` : 'none';
    el.style.transform = `translate(${cx - cw/2 + offsetX}px, ${cy - ch/2 + offsetY}px) rotate(${rot}deg)`;
    el.style.opacity = '1';
    el.style.pointerEvents = 'none';
  });

  state = 'deck';
}

// --- Shuffle animation ---
// --- Sound effects (Web Audio API, no external files) ---
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playShuffleSound() {
  const ctx = getAudioCtx();
  // Rapid soft clicks to simulate card riffle
  for (let i = 0; i < 8; i++) {
    const t = ctx.currentTime + i * 0.06;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 2000 + Math.random() * 2000;
    osc.type = 'triangle';
    osc.frequency.value = 800 + Math.random() * 600;
    gain.gain.setValueAtTime(0.03, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    osc.connect(filter).connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.04);
  }
}

function playFlipSound() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.15);
}

function playRevealChime() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  [523, 659, 784].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const start = t + i * 0.12;
    gain.gain.setValueAtTime(0.04, start);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(start);
    osc.stop(start + 0.5);
  });
}

function shuffleDeck() {
  if (state === 'shuffling') return;
  state = 'shuffling';
  playShuffleSound();
  shuffleBtn.classList.add('disabled');

  // If fanned, gather back first
  if (pickedIndex >= 0) {
    cardEls[pickedIndex].classList.remove('flipped', 'picking');
    pickedIndex = -1;
  }

  const gatherDuration = state === 'deck' ? 0 : 500;

  positionAsDeck(true);

  setTimeout(() => {
    doRiffles(0, 3, () => {
      for (let i = deckOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deckOrder[i], deckOrder[j]] = [deckOrder[j], deckOrder[i]];
      }
      setTimeout(() => fanOut(), 200);
    });
  }, gatherDuration + 300);
}

function doRiffles(count, total, callback) {
  if (count >= total) { callback(); return; }

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
  const half = Math.floor(CARD_COUNT / 2);
  const speed = 0.14;

  // Split left/right
  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const isLeft = order < half;
    const spread = isLeft ? -60 : 60;
    const lift = -20 - Math.random() * 10;
    const rot = isLeft ? -8 : 8;

    el.style.transition = `transform ${speed}s cubic-bezier(0.4, 0, 0.2, 1)`;
    el.style.transform = `translate3d(${cx - cw/2 + spread}px, ${cy - ch/2 + lift}px, 0) rotate(${rot}deg)`;
  });

  // Interleave back
  setTimeout(() => {
    const left = deckOrder.slice(0, half);
    const right = deckOrder.slice(half);
    const merged = [];
    let li = 0, ri = 0;
    while (li < left.length || ri < right.length) {
      if (ri < right.length) merged.push(right[ri++]);
      if (li < left.length) merged.push(left[li++]);
    }
    deckOrder.length = 0;
    merged.forEach(v => deckOrder.push(v));

    cardEls.forEach((el, i) => {
      const order = deckOrder.indexOf(i);
      const offsetY = -order * 0.4;
      el.style.zIndex = order;
      el.style.transition = `transform ${speed}s cubic-bezier(0.4, 0, 0.2, 1)`;
      el.style.transform = `translate3d(${cx - cw/2}px, ${cy - ch/2 + offsetY}px, 0) rotate(${(Math.random()-0.5)*2}deg)`;
    });

    setTimeout(() => doRiffles(count + 1, total, callback), 220);
  }, 200);
}

// --- Orbit ring ---
let orbitAngle = 0; // current rotation in radians
let orbitRAF = null;
const ORBIT_SPEED = 0.12; // radians per second — slow, meditative
const ORBIT_SPEED_HOVER = 0.02; // much slower when hovering cards
let orbitHovering = false;

function getOrbitParams() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
  // Ellipse: wide, slightly tilted for perspective
  const isMobile = w <= 768;
  const rx = isMobile ? w * 0.62 : Math.min(w * 0.36, 480);
  const ry = rx * (isMobile ? 0.38 : 0.32);
  const cx = w / 2 - cw / 2;
  const cy = h / 2 - ch / 2 - 100;
  return { rx, ry, cx, cy, cw, ch };
}

function cardOrbitPos(order, n, angle, params) {
  const theta = angle + (order / n) * Math.PI * 2;
  // Pear-shaped orbit: rx grows when card is at front (sin > 0)
  // Smooth pear shape: (sin+1)/2 gives 0 at back, 1 at front, no kinks
  const frontness = (Math.sin(theta) + 1) / 2;
  const fp = frontness * frontness; // concentrate effect toward front center
  const BULGE = 0.8;
  const rx = params.rx * (1 + fp * BULGE);
  const SMILE = 0.9;
  const ry = params.ry * (1 + fp * SMILE);
  const x = params.cx + Math.cos(theta) * rx;
  const y = params.cy + Math.sin(theta) * ry;
  const depth = Math.sin(theta);
  const scale = 0.7 + depth * 0.3;
  const rot = Math.cos(theta) * -6;
  const z = Math.round((depth + 1) * 500);
  return { x, y, scale, rot, z, depth };
}

function fanOut() {
  orbitAngle = 0;
  state = 'fanned';
  shuffleBtn.classList.remove('disabled');

  // Initial position with transition
  const params = getOrbitParams();
  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);
    el.style.transition = `transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${order * 20}ms, opacity 0.4s ease`;
    el.style.zIndex = pos.z;
    el.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0) rotate(${pos.rot}deg) scale(${pos.scale})`;
    el.style.opacity = '1';
    el.style.pointerEvents = 'auto';
  });

  // Start orbit after transition settles
  setTimeout(() => startOrbit(), 900);
}

function startOrbit() {
  if (orbitRAF) cancelAnimationFrame(orbitRAF);
  let lastTime = performance.now();

  function tick(now) {
    if (state !== 'fanned') return;
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    orbitAngle += dt * (orbitHovering ? ORBIT_SPEED_HOVER : ORBIT_SPEED);

    const params = getOrbitParams();
    cardEls.forEach((el, i) => {
      if (i === pickedIndex) return;
      const order = deckOrder.indexOf(i);
      const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);
      el.style.transition = 'none';
      el.style.zIndex = pos.z;
      el.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0) rotate(${pos.rot}deg) scale(${pos.scale})`;
      el.style.filter = `drop-shadow(0 ${4 + pos.depth * 8}px ${10 + pos.depth * 12}px rgba(0,0,0,${(0.25 + pos.depth * 0.2).toFixed(2)}))`;
      el.style.opacity = '1';
    });

    orbitRAF = requestAnimationFrame(tick);
  }
  orbitRAF = requestAnimationFrame(tick);
}

// --- Card interaction ---
function onCardClick(index) {
  if (state === 'fanned' && pickedIndex < 0) {
    pickCard(index);
  } else if (state === 'fanned' && pickedIndex === index) {
    // Flip the picked card
    cardEls[index].classList.toggle('flipped');
  } else if (state === 'fanned' && pickedIndex >= 0 && pickedIndex !== index) {
    // Put back current, pick new
    putBackCard(() => pickCard(index));
  }
}

function pickCard(index) {
  pickedIndex = index;
  state = 'fanned'; // still fanned, just one is picked

  const el = cardEls[index];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));

  // Scale up and center — reparent to body so it's above the blur overlay
  const maxW = window.innerWidth * 0.8;
  const maxH = window.innerHeight * 0.7;
  const scale = Math.min(maxW / cw, maxH / ch, 2.5);

  // Capture current orbit position before reparenting
  const rect = el.getBoundingClientRect();
  document.body.appendChild(el);
  el.classList.add('picking');
  el.style.zIndex = 2000;
  el.style.position = 'fixed';
  el.style.filter = 'none';
  el.style.opacity = '1';
  el.style.left = '0';
  el.style.top = '0';
  // Set to current orbit position instantly (no transition)
  el.style.transition = 'none';
  el.style.transform = `translate(${rect.left}px, ${rect.top}px) scale(1) rotate(0deg)`;

  // Show overlay
  const overlay = document.getElementById('pickOverlay');
  overlay.classList.add('active');
  document.getElementById('cardStage').style.visibility = 'hidden';

  // Animate to center on next frame using scale, then swap to zoom for crisp text
  const tilt = (Math.random() - 0.5) * 12; // -6° to +6°
  requestAnimationFrame(() => {
    el.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
    el.style.transform = `translate(${cx - cw/2}px, ${cy - ch/2}px) scale(${scale}) rotate(${tilt}deg)`;

    // After fly-up animation: swap to zoom + flip in one frame
    setTimeout(() => {
      el.style.transition = 'none';
      el.style.zoom = scale;
      const tx = Math.round((cx - cw*scale/2) / scale);
      const ty = Math.round((cy - ch*scale/2) / scale);
      el.style.transform = `translate(${tx}px, ${ty}px) rotate(${tilt}deg)`;
      // Force layout so 'none' transition takes effect
      el.offsetHeight;
      // Now flip with transition
      el.style.transition = 'transform 0.5s ease';
      el.classList.add('flipped');
      playFlipSound();
      setTimeout(playRevealChime, 300);
    }, 600);
  });

  // Dim other cards
  cardEls.forEach((other, i) => {
    if (i !== index) {
      other.style.pointerEvents = 'none';
    }
  });

  // Click outside to close
  const closeHandler = (e) => {
    if (el.contains(e.target)) return;
    document.removeEventListener('click', closeHandler);
    putBackCard();
  };
  setTimeout(() => {
    document.addEventListener('click', closeHandler);
    document.getElementById('pickOverlay').onclick = () => {
      document.removeEventListener('click', closeHandler);
      putBackCard();
    };
  }, 100);
}

function putBackCard(callback) {
  if (pickedIndex < 0) { if (callback) callback(); return; }

  const el = cardEls[pickedIndex];
  const order = deckOrder.indexOf(pickedIndex);
  const params = getOrbitParams();
  const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);

  el.classList.remove('flipped', 'picking');
  el.style.position = 'absolute';
  el.style.width = '';
  el.style.height = '';
  el.style.filter = '';
  el.style.left = '';
  el.style.top = '';
  el.style.zoom = '';
  // Reparent back to stage
  document.getElementById('cardStage').appendChild(el);
  el.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
  el.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0) rotate(${pos.rot}deg) scale(${pos.scale})`;
  el.style.zIndex = pos.z;

  // Restore other cards
  document.getElementById('pickOverlay').classList.remove('active');
  document.getElementById('cardStage').style.visibility = 'visible';
  cardEls.forEach((other) => {
    other.style.pointerEvents = 'auto';
  });

  pickedIndex = -1;

  setTimeout(() => { if (callback) callback(); }, 500);
}

// --- Snow shader (same as before) ---
function initSnow() {
  const container = document.getElementById('snowCanvas');
  const { Scene, OrthographicCamera, WebGLRenderer, PlaneGeometry, ShaderMaterial, Mesh, Vector2 } = THREE;

  const scene = new Scene();
  const camera = new OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const renderer = new WebGLRenderer({ antialias: false, alpha: true, premultipliedAlpha: false, powerPreference: 'high-performance', stencil: false, depth: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
  const fragmentShader = `
precision mediump float;
out vec4 fragColor;
uniform float uTime;
uniform vec2 uResolution;
uniform float uFlakeSize;
uniform float uMinFlakeSize;
uniform float uPixelResolution;
uniform float uSpeed;
uniform float uDepthFade;
uniform float uFarPlane;
uniform vec3 uColor;
uniform float uBrightness;
uniform float uGamma;
uniform float uDensity;
uniform float uDirection;

#define PI 3.14159265
#define M1 1597334677U
#define M2 3812015801U
#define M3 3299493293U
#define F0 2.3283064e-10
#define hash(n) (n * (n ^ (n >> 15)))
#define coord3(p) (uvec3(p).x * M1 ^ uvec3(p).y * M2 ^ uvec3(p).z * M3)

const vec3 camK = vec3(0.57735027, 0.57735027, 0.57735027);
const vec3 camI = vec3(0.70710678, 0.0, -0.70710678);
const vec3 camJ = vec3(-0.40824829, 0.81649658, -0.40824829);

vec3 hash3(uint n) {
  uvec3 hashed = hash(n) * uvec3(1U, 511U, 262143U);
  return vec3(hashed) * F0;
}

void main() {
  float invPixelRes = 1.0 / uPixelResolution;
  float pixelSize = max(1.0, floor(0.5 + uResolution.x * invPixelRes));
  float invPixelSize = 1.0 / pixelSize;
  vec2 fragCoord = floor(gl_FragCoord.xy * invPixelSize);
  vec2 res = uResolution * invPixelSize;
  float invResX = 1.0 / res.x;
  vec3 ray = normalize(vec3((fragCoord - res * 0.5) * invResX, 1.0));
  ray = ray.x * camI + ray.y * camJ + ray.z * camK;
  float timeSpeed = uTime * uSpeed;
  float windX = cos(uDirection) * 0.4;
  float windY = sin(uDirection) * 0.4;
  vec3 camPos = (windX * camI + windY * camJ + 0.1 * camK) * timeSpeed;
  vec3 pos = camPos;
  vec3 absRay = max(abs(ray), vec3(0.001));
  vec3 strides = 1.0 / absRay;
  vec3 raySign = step(ray, vec3(0.0));
  vec3 phase = fract(pos) * strides;
  phase = mix(strides - phase, phase, raySign);
  float rayDotCamK = dot(ray, camK);
  float invRayDotCamK = 1.0 / rayDotCamK;
  float invDepthFade = 1.0 / uDepthFade;
  float halfInvResX = 0.5 * invResX;
  vec3 timeAnim = timeSpeed * 0.1 * vec3(7.0, 8.0, 5.0);
  float t = 0.0;
  for (int i = 0; i < 128; i++) {
    if (t >= uFarPlane) break;
    vec3 fpos = floor(pos);
    uint cellCoord = coord3(fpos);
    float cellHash = hash3(cellCoord).x;
    if (cellHash < uDensity) {
      vec3 h = hash3(cellCoord);
      vec3 sinArg1 = fpos.yzx * 0.073;
      vec3 sinArg2 = fpos.zxy * 0.27;
      vec3 flakePos = 0.5 - 0.5 * cos(4.0 * sin(sinArg1) + 4.0 * sin(sinArg2) + 2.0 * h + timeAnim);
      flakePos = flakePos * 0.8 + 0.1 + fpos;
      float toIntersection = dot(flakePos - pos, camK) * invRayDotCamK;
      if (toIntersection > 0.0) {
        vec3 testPos = pos + ray * toIntersection - flakePos;
        float testX = dot(testPos, camI);
        float testY = dot(testPos, camJ);
        vec2 testUV = abs(vec2(testX, testY));
        float depth = dot(flakePos - camPos, camK);
        float flakeSize = max(uFlakeSize, uMinFlakeSize * depth * halfInvResX);
        float dist = max(testUV.x, testUV.y);
        if (dist < flakeSize) {
          float flakeSizeRatio = uFlakeSize / flakeSize;
          float intensity = exp2(-(t + toIntersection) * invDepthFade) * min(1.0, flakeSizeRatio * flakeSizeRatio) * uBrightness;
          fragColor = vec4(uColor * pow(vec3(intensity), vec3(uGamma)), 1.0);
          return;
        }
      }
    }
    float nextStep = min(min(phase.x, phase.y), phase.z);
    vec3 sel = step(phase, vec3(nextStep));
    phase = phase - nextStep + strides * sel;
    t += nextStep;
    pos = mix(pos + ray * nextStep, floor(pos + ray * nextStep + 0.5), sel);
  }
  fragColor = vec4(0.0);
}`;

  const material = new ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uResolution: { value: new Vector2(window.innerWidth, window.innerHeight) },
      uFlakeSize: { value: 0.01 },
      uMinFlakeSize: { value: 1.25 },
      uPixelResolution: { value: 200 },
      uSpeed: { value: 1.25 },
      uDepthFade: { value: 8 },
      uFarPlane: { value: 20 },
      uColor: { value: new THREE.Vector3(0.91, 0.39, 0.12) },
      uBrightness: { value: 1 },
      uGamma: { value: 0.4545 },
      uDensity: { value: 0.3 },
      uDirection: { value: (125 * Math.PI) / 180 }
    },
    transparent: true,
    glslVersion: THREE.GLSL3
  });

  const geometry = new PlaneGeometry(2, 2);
  scene.add(new Mesh(geometry, material));

  const startTime = performance.now();
  function snowAnimate() {
    material.uniforms.uTime.value = (performance.now() - startTime) * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(snowAnimate);
  }
  snowAnimate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && pickedIndex >= 0) {
    putBackCard();
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    shuffleBtn.click();
  }
});

init();
</script>
