<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cards of Answers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #e8641e;
    --accent-light: #e8b020;
    --accent-dim: #b04810;
    --crimson: #cc2828;
    --charcoal: #2a2a2a;
    --cream: #f0ebe0;
    --grey: #9a9590;
    --bg: #141414;
    --bg-deep: #0a0a0a;
    --card-w: 140px;
    --card-h: 200px;
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* --- Header --- */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .header > * { pointer-events: auto; }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
  }
  .path-switcher {
    display: flex;
    gap: 4px;
    background: rgba(42,42,42,0.06);
    border: 1px solid rgba(42,42,42,0.1);
    border-radius: 8px;
    padding: 4px;
  }
  .path-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--grey);
    background: transparent;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .path-btn:hover { color: var(--cream); }
  .path-btn.active {
    background: rgba(232,100,30,0.12);
    color: var(--accent);
  }

  /* --- Prompt --- */
  .prompt {
    position: fixed;
    bottom: 48px;
    left: 50%; transform: translateX(-50%);
    z-index: 100;
    text-align: center;
    pointer-events: none;
    width: max-content;
  }
  .prompt-text {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--grey);
    opacity: 0.6;
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* --- Canvas area --- */
  .marquee-container {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .path-svg {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* --- Cards --- */
  .card-track {
    position: absolute;
    inset: 0;
  }
  .card-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--card-w);
    height: var(--card-h);
    offset-rotate: auto;
    will-change: offset-distance;
    cursor: pointer;
    perspective: 600px;
    transition: filter 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .card-wrapper:hover {
    filter: brightness(1.05) drop-shadow(0 0 20px rgba(232,100,30,0.3));
    z-index: 10;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }

  /* Card back */
  .card-back {
    background: var(--cream);
    border: 1.5px solid rgba(154,149,144,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(232,100,30,0.2);
    border-radius: 7px;
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(232,176,32,0.15);
    border-radius: 5px;
  }
  .card-symbol {
    font-size: 48px;
    color: var(--accent);
    opacity: 0.8;
    filter: drop-shadow(0 0 8px rgba(232,100,30,0.3));
    z-index: 1;
  }
  .card-corner {
    position: absolute;
    font-family: 'DM Serif Display', serif;
    font-size: 10px;
    color: var(--accent-light);
    opacity: 0.5;
  }
  .card-corner.tl { top: 14px; left: 14px; }
  .card-corner.br { bottom: 14px; right: 14px; transform: rotate(180deg); }

  /* Card front */
  .card-front {
    background: var(--cream);
    border: 1.5px solid var(--accent);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    color: var(--charcoal);
    z-index: 2;
  }
  .card-category {
    font-family: 'DM Serif Display', serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 12px;
  }
  .card-front-symbol {
    font-size: 32px;
    color: var(--accent);
    opacity: 1;
    margin-bottom: 4px;
  }
  .card-answer {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    color: var(--charcoal);
    font-style: italic;
  }
  .card-number {
    position: absolute;
    bottom: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    color: var(--grey);
    opacity: 0.5;
  }

  /* --- Overlay --- */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .overlay.active {
    pointer-events: auto;
    opacity: 1;
  }
  .overlay-bg {
    position: absolute;
    inset: 0;
    background: rgba(30,30,30,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .overlay-card {
    position: relative;
    z-index: 1;
    width: 260px;
    height: 380px;
    perspective: 1000px;
    cursor: pointer;
  }
  .overlay-card .card-inner {
    width: 100%;
    height: 100%;
  }
  .overlay-card .card-answer {
    font-size: 20px;
    line-height: 1.6;
  }
  .overlay-card .card-category {
    font-size: 10px;
    margin-bottom: 16px;
  }
  .overlay-card .card-symbol { font-size: 72px; }
  .overlay-card .card-front-symbol { font-size: 48px; margin-bottom: 14px; }
  .overlay-card .card-corner { font-size: 14px; }
  .overlay-card .card-corner.tl { top: 18px; left: 18px; }
  .overlay-card .card-corner.br { bottom: 18px; right: 18px; }
  .overlay-card .card-back::before { inset: 10px; }
  .overlay-card .card-back::after { inset: 18px; }
  .overlay-card .card-number { font-size: 11px; bottom: 16px; }
  .overlay-card .card-front { padding: 32px 24px; }

  .overlay-hint {
    position: absolute;
    bottom: 60px;
    left: 50%; transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(240,235,224,0.4);
    z-index: 1;
    white-space: nowrap;
  }

  /* Snow background */
  #snowCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  #snowCanvas canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ========== MOBILE ========== */
  @media (max-width: 768px) {
    :root {
      --card-w: 80px;
      --card-h: 114px;
    }

    .header {
      padding: 16px 16px;
    }
    .logo {
      font-size: 12px;
      letter-spacing: 0.2em;
    }
    .path-switcher {
      gap: 2px;
      padding: 3px;
    }
    .path-btn {
      font-size: 9px;
      padding: 6px 10px;
      letter-spacing: 0.05em;
    }

    .prompt {
      bottom: 32px;
    }
    .prompt-text {
      font-size: 10px;
      letter-spacing: 0.15em;
    }

    .card-symbol { font-size: 28px; }
    .card-corner { font-size: 7px; }
    .card-corner.tl { top: 8px; left: 8px; }
    .card-corner.br { bottom: 8px; right: 8px; }
    .card-back::before { inset: 4px; }
    .card-back::after { inset: 7px; }
    .card-answer { font-size: 10px; line-height: 1.4; }
    .card-category { font-size: 6px; margin-bottom: 6px; }
    .card-number { font-size: 7px; bottom: 8px; }
    .card-front { padding: 12px 8px; }

    .overlay-card {
      width: 220px;
      height: 320px;
    }
    .overlay-card .card-symbol { font-size: 56px; }
    .overlay-card .card-answer { font-size: 17px; line-height: 1.5; }
    .overlay-card .card-category { font-size: 9px; }
    .overlay-card .card-corner { font-size: 12px; }
    .overlay-card .card-front { padding: 24px 18px; }

    .overlay-hint {
      bottom: 40px;
      font-size: 9px;
    }
  }

  @media (max-width: 480px) {
    :root {
      --card-w: 64px;
      --card-h: 92px;
    }

    .card-symbol { font-size: 22px; }
    .card-corner { font-size: 6px; }
    .card-corner.tl { top: 6px; left: 6px; }
    .card-corner.br { bottom: 6px; right: 6px; }
    .card-back::before { inset: 3px; }
    .card-back::after { inset: 5px; }
    .card-answer { font-size: 8px; }
    .card-category { font-size: 5px; margin-bottom: 4px; }
    .card-number { font-size: 6px; bottom: 6px; }
    .card-front { padding: 8px 6px; }

    .overlay-card {
      width: 200px;
      height: 290px;
    }
    .overlay-card .card-symbol { font-size: 48px; }
    .overlay-card .card-answer { font-size: 16px; }
  }
</style>
</head>
<body>

<div id="snowCanvas"></div>

<div class="header">
  <div class="logo">Cards of Answers</div>
  <div class="path-switcher">
    <button class="path-btn active" data-path="curly">Curly</button>
    <button class="path-btn" data-path="loop">Loop</button>
    <button class="path-btn" data-path="wave">Wave</button>
  </div>
</div>

<div class="prompt">
  <div class="prompt-text">Draw a card for your answer</div>
</div>

<div class="marquee-container">
  <svg class="path-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" id="pathSvg">
  </svg>
  <div class="card-track" id="cardTrack"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-bg" id="overlayBg"></div>
  <div class="overlay-card" id="overlayCard"></div>
  <div class="overlay-hint">tap to flip · tap outside to close</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const ANSWERS = [
  { category: "Courage", answer: "The thing you fear most is exactly what you must do.", symbol: "♠" },
  { category: "Patience", answer: "Not yet. But soon.", symbol: "♣" },
  { category: "Truth", answer: "You already know the answer. Trust it.", symbol: "♦" },
  { category: "Change", answer: "What you're holding onto is holding you back.", symbol: "♥" },
  { category: "Love", answer: "Open the door you keep pretending is locked.", symbol: "♥" },
  { category: "Action", answer: "Stop planning. Start.", symbol: "♠" },
  { category: "Wisdom", answer: "The teacher appears when the student is ready.", symbol: "♣" },
  { category: "Solitude", answer: "Being alone is not the same as being lonely.", symbol: "♦" },
  { category: "Fate", answer: "This was always going to happen.", symbol: "♠" },
  { category: "Hope", answer: "The darkest hour is just before dawn.", symbol: "♥" },
  { category: "Doubt", answer: "Your doubt is not protecting you — it is limiting you.", symbol: "♣" },
  { category: "Growth", answer: "Discomfort is the price of a meaningful life.", symbol: "♦" },
  { category: "Time", answer: "It's not too late. It's never too late.", symbol: "♠" },
  { category: "Joy", answer: "Happiness is not found. It is created.", symbol: "♥" },
  { category: "Focus", answer: "Do less. But do it completely.", symbol: "♣" },
  { category: "Release", answer: "Forgive them. Not for them — for you.", symbol: "♦" },
  { category: "Risk", answer: "The biggest risk is not taking one.", symbol: "♠" },
  { category: "Rest", answer: "You are not lazy. You are exhausted. Rest.", symbol: "♥" },
  { category: "Connection", answer: "Call the person you've been thinking about.", symbol: "♣" },
  { category: "Clarity", answer: "Simplify. Then simplify again.", symbol: "♦" },
  { category: "Acceptance", answer: "Let it be what it is.", symbol: "♥" },
  { category: "Ambition", answer: "Dream bigger. You're playing too small.", symbol: "♠" },
  { category: "Gratitude", answer: "Look at what you have. Really look.", symbol: "♣" },
  { category: "Mystery", answer: "Not everything needs to be understood.", symbol: "♦" },
];

const SYMBOLS = ["✦", "◈", "✧", "⬥", "❖", "☽", "✶", "⊕"];

// --- Responsive config ---
function getConfig() {
  const w = window.innerWidth;
  const isWave = currentPath === 'wave';
  if (w <= 480) return { cardCount: isWave ? 8 : 22, speed: 0.06 };
  if (w <= 768) return { cardCount: isWave ? 14 : 24, speed: 0.07 };
  return { cardCount: 16, speed: 0.08 };
}

let config = null;

const PATHS = {
  loop: (w, h) => {
    // Codrops exact path scaled to viewport center
    // Original in 588x187: M0 186 C138.5 186 305.5 194 305.5 49 C305.5 -113 -75 186 484.5 186 H587
    // Scale to fit ~80% of width, centered vertically
    const pw = w * 1.0, ph = pw * (300 / 588); // taller ratio for rounder loop
    const ox = (w - pw) / 2; // centered (overflows both sides)
    const oy = (h - ph) / 2 + ph * 0.25;
    const sx = pw / 588, sy = ph / 187;
    const p = (x, y) => `${x * sx + ox} ${y * sy + oy}`;
    // Extend path beyond viewport: extra straight segments offscreen
    const margin = w * 0.15;
    return `M ${-margin} ${186 * sy + oy} L ${p(0, 186)} C ${p(138.5, 186)} ${p(305.5, 194)} ${p(305.5, 49)} C ${p(305.5, -113)} ${p(-75, 186)} ${p(484.5, 186)} L ${p(588, 186)} L ${w + margin} ${186 * sy + oy}`;
  },
  wave: (w, h) => {
    // Open wave: offscreen left → sine wave → offscreen right
    const amp = h * 0.08, mid = h / 2;
    const margin = w * 0.15; // extend beyond viewport
    const totalW = w + margin * 2;
    const seg = totalW / 4;
    const x0 = -margin;
    return `M ${x0} ${mid} C ${x0 + seg * 0.5} ${mid - amp} ${x0 + seg} ${mid - amp} ${x0 + seg * 1.5} ${mid} C ${x0 + seg * 2} ${mid + amp} ${x0 + seg * 2.5} ${mid + amp} ${x0 + seg * 3} ${mid} C ${x0 + seg * 3.5} ${mid - amp} ${x0 + seg * 4} ${mid - amp} ${w + margin} ${mid}`;
  },
  curly: (w, h) => {
    const cx = w / 2, cy = h / 2;
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
      // Vertical lemniscate (♾️ rotated 90°) — wide rounded lobes
      const rx = w * 0.38, ry = h * 0.32;
      return `M ${cx} ${cy} C ${cx + rx} ${cy - ry * 0.15} ${cx + rx} ${cy - ry * 0.85} ${cx} ${cy - ry} C ${cx - rx} ${cy - ry * 0.85} ${cx - rx} ${cy - ry * 0.15} ${cx} ${cy} C ${cx + rx} ${cy + ry * 0.15} ${cx + rx} ${cy + ry * 0.85} ${cx} ${cy + ry} C ${cx - rx} ${cy + ry * 0.85} ${cx - rx} ${cy + ry * 0.15} ${cx} ${cy}`;
    }
    const sx = w * 0.38, sy = h * 0.38;
    // Horizontal lemniscate ♾️ — two symmetric round lobes
    return `M ${cx} ${cy} C ${cx + sx * 0.15} ${cy - sy} ${cx + sx * 0.85} ${cy - sy} ${cx + sx} ${cy} C ${cx + sx * 0.85} ${cy + sy} ${cx + sx * 0.15} ${cy + sy} ${cx} ${cy} C ${cx - sx * 0.15} ${cy - sy} ${cx - sx * 0.85} ${cy - sy} ${cx - sx} ${cy} C ${cx - sx * 0.85} ${cy + sy} ${cx - sx * 0.15} ${cy + sy} ${cx} ${cy}`;
  },
  // stream removed
};

let currentPath = 'curly';
let animId = null;
let cards = [];
let pathEl = null;
let pathLength = 0;
let offsets = [];

function createPath(type) {
  const svg = document.getElementById('pathSvg');
  const vw = 1600, vh = 900;
  svg.innerHTML = '';
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', PATHS[type](vw, vh));
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', 'none');
  path.id = 'motionPath';
  svg.appendChild(path);
  pathEl = path;
  pathLength = path.getTotalLength();
  return path;
}

function createCardEl(index) {
  const answer = ANSWERS[index % ANSWERS.length];
  const sym = SYMBOLS[index % SYMBOLS.length];
  const num = String(index + 1).padStart(2, '0');

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.dataset.index = index;

  wrapper.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back">
        <span class="card-corner tl">${answer.symbol}</span>
        <span class="card-symbol">${sym}</span>
        <span class="card-corner br">${answer.symbol}</span>
      </div>
      <div class="card-face card-front">
        <span class="card-front-symbol">${sym}</span>
        <span class="card-category">${answer.category}</span>
        <span class="card-answer">"${answer.answer}"</span>
        <span class="card-number">${num}</span>
      </div>
    </div>
  `;

  wrapper.addEventListener('click', () => openCard(index));
  return wrapper;
}

function buildCards() {
  const track = document.getElementById('cardTrack');
  track.innerHTML = '';
  cards = [];
  offsets = [];
  config = getConfig();

  for (let i = 0; i < config.cardCount; i++) {
    const el = createCardEl(i);
    track.appendChild(el);
    cards.push(el);
    offsets.push((i / config.cardCount) * 100);
  }
}

let screenPathD = ''; // cached screen-space path string

function buildScreenPath() {
  if (!pathEl) return;
  const svg = document.getElementById('pathSvg');
  const svgRect = svg.getBoundingClientRect();
  const vbW = 1600, vbH = 900;
  const scaleX = svgRect.width / vbW;
  const scaleY = svgRect.height / vbH;
  const offX = svgRect.left;
  const offY = svgRect.top;

  // Sample path points
  const steps = 200;
  const pts = [];
  for (let s = 0; s <= steps; s++) {
    const pt = pathEl.getPointAtLength((s / steps) * pathLength);
    pts.push({ x: pt.x * scaleX + offX, y: pt.y * scaleY + offY });
  }
  // Build smooth cubic bezier path using Catmull-Rom to Bezier conversion
  screenPathD = `M ${pts[0].x} ${pts[0].y}`;
  for (let s = 0; s < steps; s++) {
    const p0 = pts[s === 0 ? steps - 1 : s - 1];
    const p1 = pts[s];
    const p2 = pts[s + 1 > steps ? 1 : s + 1];
    const p3 = pts[s + 2 > steps ? (s + 2 - steps) : s + 2];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    screenPathD += ` C ${cp1x} ${cp1y} ${cp2x} ${cp2y} ${p2.x} ${p2.y}`;
  }
  // Close the screen path only if the SVG path is closed
  const origD = pathEl.getAttribute('d');
  if (/[Zz]\s*$/.test(origD)) {
    screenPathD += ' Z';
  }

  // Apply offset-path once to all cards
  const pathCSS = `path("${screenPathD}")`;
  for (let i = 0; i < cards.length; i++) {
    cards[i].style.offsetPath = pathCSS;
  }
  // Initialize offsets evenly
  for (let i = 0; i < cards.length; i++) {
    offsets[i] = (i / cards.length) * 100;
  }
  startMarquee();
}

// --- Spring-based hover slowdown ---
let hoverTarget = 1;       // 1 = normal, 0.15 = slowed
let hoverFactor = 1;       // current smoothed value
const hoverStiffness = 4;  // spring-like smoothing speed

let isHovering = false;
let marqueeRAF = null;

function wrap(min, max, v) {
  const range = max - min;
  return (((v - min) % range + range) % range) + min;
}

// Opacity curve: fade at path edges — f(x) = (1 − |2x − 1|^6)^2
function edgeOpacity(pct) {
  const x = 2 * (pct / 100) - 1;
  return Math.pow(1 - Math.pow(Math.abs(x), 6), 2);
}

function startMarquee() {
  if (marqueeRAF) cancelAnimationFrame(marqueeRAF);

  // Desktop hover listeners
  if (window.innerWidth > 768) {
    cards.forEach(card => {
      card.addEventListener('mouseenter', () => { isHovering = true; });
      card.addEventListener('mouseleave', () => { isHovering = false; });
    });
  }

  let lastTime = performance.now();
  const baseVelocity = 100 / 60; // ~100% per 60s = same speed as before

  function tick(now) {
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    // Smooth hover factor (spring-like lerp)
    hoverTarget = isHovering ? 0.15 : 1;
    hoverFactor += (hoverTarget - hoverFactor) * Math.min(1, hoverStiffness * delta);

    const moveBy = baseVelocity * delta * hoverFactor;

    for (let i = 0; i < cards.length; i++) {
      offsets[i] = wrap(0, 100, offsets[i] + moveBy);
      cards[i].style.offsetDistance = `${offsets[i]}%`;

      // Z-index: higher progress = higher z-index (fixes crossing overlap)
      cards[i].style.zIndex = Math.floor(offsets[i]);
    }

    marqueeRAF = requestAnimationFrame(tick);
  }

  marqueeRAF = requestAnimationFrame(tick);
}

function positionCards() {
  // Called on init before marquee starts
  for (let i = 0; i < cards.length; i++) {
    let pct = offsets[i] % 100;
    if (pct < 0) pct += 100;
    cards[i].style.offsetDistance = `${pct}%`;
  }
}

function animate() {
  // No-op — marquee tick handles everything
}

function switchPath(type) {
  currentPath = type;
  config = getConfig();
  buildCards();
  createPath(type);
  // Wait for layout then build screen path and start animations
  requestAnimationFrame(() => {
    buildScreenPath();
  });

  document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-path="${type}"]`).classList.add('active');
}

function openCard(index) {
  const answer = ANSWERS[index % ANSWERS.length];
  const sym = SYMBOLS[index % SYMBOLS.length];
  const num = String(index + 1).padStart(2, '0');
  const overlay = document.getElementById('overlay');
  const overlayCard = document.getElementById('overlayCard');

  overlayCard.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back">
        <span class="card-corner tl">${answer.symbol}</span>
        <span class="card-symbol">${sym}</span>
        <span class="card-corner br">${answer.symbol}</span>
      </div>
      <div class="card-face card-front">
        <span class="card-front-symbol">${sym}</span>
        <span class="card-category">${answer.category}</span>
        <span class="card-answer">"${answer.answer}"</span>
        <span class="card-number">${num}</span>
      </div>
    </div>
  `;

  overlay.classList.add('active');

  setTimeout(() => {
    const inner = overlayCard.querySelector('.card-inner');
    if (inner) {
      inner.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
      inner.style.transform = 'rotateY(180deg)';
    }
  }, 400);

  overlayCard.onclick = (e) => {
    e.stopPropagation();
    const inner = overlayCard.querySelector('.card-inner');
    const isFlipped = inner.style.transform === 'rotateY(180deg)';
    inner.style.transform = isFlipped ? 'rotateY(0deg)' : 'rotateY(180deg)';
  };
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

document.getElementById('overlayBg').addEventListener('click', closeOverlay);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

document.querySelectorAll('.path-btn').forEach(btn => {
  btn.addEventListener('click', () => switchPath(btn.dataset.path));
});

function spawnParticles() {
  // replaced by snow shader
}

function initSnow() {
  const container = document.getElementById('snowCanvas');
  const { Scene, OrthographicCamera, WebGLRenderer, PlaneGeometry, ShaderMaterial, Mesh, Vector2 } = THREE;

  const scene = new Scene();
  const camera = new OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const renderer = new WebGLRenderer({ antialias: false, alpha: true, premultipliedAlpha: false, powerPreference: 'high-performance', stencil: false, depth: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
  const fragmentShader = `
precision mediump float;
out vec4 fragColor;
uniform float uTime;
uniform vec2 uResolution;
uniform float uFlakeSize;
uniform float uMinFlakeSize;
uniform float uPixelResolution;
uniform float uSpeed;
uniform float uDepthFade;
uniform float uFarPlane;
uniform vec3 uColor;
uniform float uBrightness;
uniform float uGamma;
uniform float uDensity;
uniform float uDirection;

#define PI 3.14159265
#define PI_OVER_6 0.5235988
#define PI_OVER_3 1.0471976
#define M1 1597334677U
#define M2 3812015801U
#define M3 3299493293U
#define F0 2.3283064e-10
#define hash(n) (n * (n ^ (n >> 15)))
#define coord3(p) (uvec3(p).x * M1 ^ uvec3(p).y * M2 ^ uvec3(p).z * M3)

const vec3 camK = vec3(0.57735027, 0.57735027, 0.57735027);
const vec3 camI = vec3(0.70710678, 0.0, -0.70710678);
const vec3 camJ = vec3(-0.40824829, 0.81649658, -0.40824829);

vec3 hash3(uint n) {
  uvec3 hashed = hash(n) * uvec3(1U, 511U, 262143U);
  return vec3(hashed) * F0;
}

void main() {
  float invPixelRes = 1.0 / uPixelResolution;
  float pixelSize = max(1.0, floor(0.5 + uResolution.x * invPixelRes));
  float invPixelSize = 1.0 / pixelSize;
  vec2 fragCoord = floor(gl_FragCoord.xy * invPixelSize);
  vec2 res = uResolution * invPixelSize;
  float invResX = 1.0 / res.x;
  vec3 ray = normalize(vec3((fragCoord - res * 0.5) * invResX, 1.0));
  ray = ray.x * camI + ray.y * camJ + ray.z * camK;
  float timeSpeed = uTime * uSpeed;
  float windX = cos(uDirection) * 0.4;
  float windY = sin(uDirection) * 0.4;
  vec3 camPos = (windX * camI + windY * camJ + 0.1 * camK) * timeSpeed;
  vec3 pos = camPos;
  vec3 absRay = max(abs(ray), vec3(0.001));
  vec3 strides = 1.0 / absRay;
  vec3 raySign = step(ray, vec3(0.0));
  vec3 phase = fract(pos) * strides;
  phase = mix(strides - phase, phase, raySign);
  float rayDotCamK = dot(ray, camK);
  float invRayDotCamK = 1.0 / rayDotCamK;
  float invDepthFade = 1.0 / uDepthFade;
  float halfInvResX = 0.5 * invResX;
  vec3 timeAnim = timeSpeed * 0.1 * vec3(7.0, 8.0, 5.0);
  float t = 0.0;
  for (int i = 0; i < 128; i++) {
    if (t >= uFarPlane) break;
    vec3 fpos = floor(pos);
    uint cellCoord = coord3(fpos);
    float cellHash = hash3(cellCoord).x;
    if (cellHash < uDensity) {
      vec3 h = hash3(cellCoord);
      vec3 sinArg1 = fpos.yzx * 0.073;
      vec3 sinArg2 = fpos.zxy * 0.27;
      vec3 flakePos = 0.5 - 0.5 * cos(4.0 * sin(sinArg1) + 4.0 * sin(sinArg2) + 2.0 * h + timeAnim);
      flakePos = flakePos * 0.8 + 0.1 + fpos;
      float toIntersection = dot(flakePos - pos, camK) * invRayDotCamK;
      if (toIntersection > 0.0) {
        vec3 testPos = pos + ray * toIntersection - flakePos;
        float testX = dot(testPos, camI);
        float testY = dot(testPos, camJ);
        vec2 testUV = abs(vec2(testX, testY));
        float depth = dot(flakePos - camPos, camK);
        float flakeSize = max(uFlakeSize, uMinFlakeSize * depth * halfInvResX);
        float dist = max(testUV.x, testUV.y);
        if (dist < flakeSize) {
          float flakeSizeRatio = uFlakeSize / flakeSize;
          float intensity = exp2(-(t + toIntersection) * invDepthFade) * min(1.0, flakeSizeRatio * flakeSizeRatio) * uBrightness;
          fragColor = vec4(uColor * pow(vec3(intensity), vec3(uGamma)), 1.0);
          return;
        }
      }
    }
    float nextStep = min(min(phase.x, phase.y), phase.z);
    vec3 sel = step(phase, vec3(nextStep));
    phase = phase - nextStep + strides * sel;
    t += nextStep;
    pos = mix(pos + ray * nextStep, floor(pos + ray * nextStep + 0.5), sel);
  }
  fragColor = vec4(0.0);
}`;

  const material = new ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uResolution: { value: new Vector2(window.innerWidth, window.innerHeight) },
      uFlakeSize: { value: 0.01 },
      uMinFlakeSize: { value: 1.25 },
      uPixelResolution: { value: 200 },
      uSpeed: { value: 1.25 },
      uDepthFade: { value: 8 },
      uFarPlane: { value: 20 },
      uColor: { value: new THREE.Vector3(0.91, 0.39, 0.12) },
      uBrightness: { value: 1 },
      uGamma: { value: 0.4545 },
      uDensity: { value: 0.3 },
      uDirection: { value: (125 * Math.PI) / 180 }
    },
    transparent: true,
    glslVersion: THREE.GLSL3
  });

  const geometry = new PlaneGeometry(2, 2);
  scene.add(new Mesh(geometry, material));

  const startTime = performance.now();
  function snowAnimate() {
    material.uniforms.uTime.value = (performance.now() - startTime) * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(snowAnimate);
  }
  snowAnimate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });
}

// Debounced resize — rebuild cards on breakpoint change
let resizeTimer;
function onResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    config = getConfig();
    buildCards();
    createPath(currentPath);
    requestAnimationFrame(() => {
      buildScreenPath();
    });
  }, 200);
}

function init() {
  buildCards();
  createPath(currentPath);
  initSnow();
  // Wait for layout then start card animations
  requestAnimationFrame(() => {
    buildScreenPath();
  });
  window.addEventListener('resize', onResize);
}

init();
</script>
