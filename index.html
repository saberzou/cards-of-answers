<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cards of Answers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Goudy+Bookletter+1911&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #e8641e;
    --accent-light: #e8b020;
    --accent-dim: #b04810;
    --crimson: #cc2828;
    --charcoal: #2a2a2a;
    --cream: #f0ebe0;
    --grey: #9a9590;
    --bg: #141414;
    --bg-deep: #0a0a0a;
    --card-w: 150px;
    --card-h: 210px;
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  /* --- Header --- */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  .logo {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
  }
  .site-intro {
    max-width: 240px;
    margin: 12px auto 0;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .site-intro.visible {
    opacity: 1;
  }
  .site-intro p {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--cream);
    opacity: 0.5;
    margin: 0;
  }

  /* --- Shuffle button --- */
  .shuffle-btn {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cream);
    background: transparent;
    border: 1px solid rgba(240,235,224,0.2);
    border-radius: 40px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.4s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .shuffle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 30px rgba(232,100,30,0.15);
  }
  .shuffle-btn:active {
    transform: translateX(-50%) scale(0.96);
  }
  .shuffle-btn.disabled {
    pointer-events: none;
    opacity: 0.3;
  }

  /* --- Card stage --- */
  .card-stage {
    position: fixed;
    inset: 0;
  }

  /* --- Cards --- */
  .card-wrapper {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    cursor: pointer;
    perspective: 800px;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }
  .card-wrapper.picking {
    z-index: 600 !important;
    filter: none !important;
    opacity: 1 !important;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }

  /* Card back */
  .card-back {
    background: var(--cream);
    border: 1.5px solid rgba(154,149,144,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .card-back-orange {
    background: var(--accent);
  }
  .card-back-orange .card-symbol,
  .card-back-orange .card-corner {
    color: var(--cream);
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(232,100,30,0.2);
    border-radius: 7px;
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(232,176,32,0.15);
    border-radius: 5px;
  }
  .card-symbol {
    font-size: 64px;
    color: var(--accent);
    opacity: 0.8;
    filter: drop-shadow(0 0 8px rgba(232,100,30,0.3));
    z-index: 1;
    display: none;
  }
  .card-mandala {
    width: 80%;
    max-width: 140px;
    color: var(--accent);
    opacity: 0.8;
    filter: drop-shadow(0 0 6px rgba(232,100,30,0.2));
    z-index: 1;
  }
  .card-back-orange .card-mandala {
    color: rgba(120, 40, 0, 0.6);
    filter: none;
  }
  .card-corner {
    position: absolute;
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 10px;
    color: var(--accent-light);
    opacity: 0.5;
  }
  .card-corner.tl { top: 14px; left: 14px; }
  .card-corner.br { bottom: 14px; right: 14px; transform: rotate(180deg); }

  /* Card front */
  .card-front {
    background: var(--cream);
    border: 1.5px solid var(--accent);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px 32px;
    color: var(--charcoal);
    z-index: 2;
  }
  .card-category {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 12px;
  }
  .card-front-symbol {
    width: 32px;
    height: 32px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .card-front-symbol svg {
    width: 100%;
    height: 100%;
  }
  .card-answer {
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    color: var(--charcoal);
    font-style: normal;
  }
  .card-number {
    position: absolute;
    bottom: 12px;
    font-family: 'Goudy Bookletter 1911', serif;
    font-size: 9px;
    color: var(--grey);
    opacity: 0.5;
  }

  /* --- Pick overlay --- */
  .pick-overlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(20,20,20,0.8);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .pick-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Snow background */
  #snowCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ========== MOBILE ========== */
  @media (max-width: 768px) {
    :root {
      --card-w: 120px;
      --card-h: 170px;
    }
    .header { padding: 16px 16px; }
    .logo { font-size: 16px; }
    .shuffle-btn { bottom: 32px; font-size: 11px; padding: 12px 32px; }
    .card-symbol { font-size: 44px; }
    .card-corner { font-size: 7px; }
    .card-corner.tl { top: 8px; left: 8px; }
    .card-corner.br { bottom: 8px; right: 8px; }
    .card-back::before { inset: 4px; }
    .card-back::after { inset: 7px; }
    .card-answer { font-size: 10px; line-height: 1.4; }
    .card-category { font-size: 6px; margin-bottom: 6px; }
    .card-number { font-size: 7px; bottom: 8px; }
    .card-front { padding: 12px 8px; }
    .card-front-symbol { width: 24px; height: 24px; }
  }

  @media (max-width: 480px) {
    :root {
      --card-w: 100px;
      --card-h: 142px;
    }
    .card-symbol { font-size: 36px; }
    .card-corner { font-size: 6px; }
    .card-back::before { inset: 3px; }
    .card-back::after { inset: 5px; }
    .card-answer { font-size: 8px; }
    .card-category { font-size: 5px; margin-bottom: 4px; }
    .card-front { padding: 8px 6px; }
    .card-front-symbol { width: 18px; height: 18px; }
  }
</style>
</head>
<body>

<div id="snowCanvas"></div>

<div class="header">
  <div class="logo">Cards of Answers</div>
  <div class="site-intro" id="siteIntro">
    <div style="width:40px;height:1px;background:var(--accent);margin:14px auto 14px;"></div>
    <p>Every card holds a message meant for you. Shuffle the deck, trust your intuition, and draw the one that calls to you.</p>
  </div>
</div>

<div class="card-stage" id="cardStage"></div>
<div class="pick-overlay" id="pickOverlay"></div>

<button class="shuffle-btn" id="shuffleBtn">Shuffle</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const ANSWERS = [
  { category: "Courage", answer: "The thing you fear most is exactly what you must do.", symbol: "♠" },
  { category: "Patience", answer: "Not yet. But soon.", symbol: "♣" },
  { category: "Truth", answer: "You already know the answer. Trust it.", symbol: "♦" },
  { category: "Change", answer: "What you're holding onto is holding you back.", symbol: "♥" },
  { category: "Love", answer: "Open the door you keep pretending is locked.", symbol: "♥" },
  { category: "Action", answer: "Stop planning. Start.", symbol: "♠" },
  { category: "Wisdom", answer: "The teacher appears when the student is ready.", symbol: "♣" },
  { category: "Solitude", answer: "Being alone is not the same as being lonely.", symbol: "♦" },
  { category: "Fate", answer: "This was always going to happen.", symbol: "♠" },
  { category: "Hope", answer: "The darkest hour is just before dawn.", symbol: "♥" },
  { category: "Doubt", answer: "Your doubt is not protecting you — it is limiting you.", symbol: "♣" },
  { category: "Growth", answer: "Discomfort is the price of a meaningful life.", symbol: "♦" },
  { category: "Time", answer: "It's not too late. It's never too late.", symbol: "♠" },
  { category: "Joy", answer: "Happiness is not found. It is created.", symbol: "♥" },
  { category: "Focus", answer: "Do less. But do it completely.", symbol: "♣" },
  { category: "Release", answer: "Forgive them. Not for them — for you.", symbol: "♦" },
  { category: "Risk", answer: "The biggest risk is not taking one.", symbol: "♠" },
  { category: "Rest", answer: "You are not lazy. You are exhausted. Rest.", symbol: "♥" },
  { category: "Connection", answer: "Call the person you've been thinking about.", symbol: "♣" },
  { category: "Clarity", answer: "Simplify. Then simplify again.", symbol: "♦" },
  { category: "Acceptance", answer: "Let it be what it is.", symbol: "♥" },
  { category: "Ambition", answer: "Dream bigger. You're playing too small.", symbol: "♠" },
  { category: "Gratitude", answer: "Look at what you have. Really look.", symbol: "♣" },
  { category: "Mystery", answer: "Not everything needs to be understood.", symbol: "♦" },
];

const SYMBOLS = ["✦", "◈", "✧", "⬥", "❖", "☽", "✶", "⊕"];

// Category-specific SVG icons (small, elegant line art)
const CATEGORY_ICONS = {
  Courage:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.09 6.26L21 9.27l-5 3.9L17.18 22 12 18.27 6.82 22 8 13.17l-5-3.9 6.91-1.01z"/></svg>`,
  Patience:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  Truth:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="10"/></svg>`,
  Change:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`,
  Love:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/></svg>`,
  Action:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  Wisdom:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>`,
  Solitude:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`,
  Fate:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M12 22a10 10 0 100-20 10 10 0 000 20z"/><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>`,
  Hope:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
  Doubt:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>`,
  Growth:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M12 22V8"/><path d="M5 12l7-7 7 7"/><path d="M8 18c0-2.2 1.8-4 4-4s4 1.8 4 4"/></svg>`,
  Time:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 00-.586-1.414L12 12l-4.414 4.414A2 2 0 007 17.828V22"/><path d="M7 2v4.172a2 2 0 00.586 1.414L12 12l4.414-4.414A2 2 0 0017 6.172V2"/></svg>`,
  Joy:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M9 11l2 2 6-6"/></svg>`,
  Focus:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  Release:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/><circle cx="12" cy="12" r="10"/></svg>`,
  Risk:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M12 2L2 19h20L12 2z"/><path d="M12 9v4"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg>`,
  Rest:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M17 18a5 5 0 00-10 0"/><path d="M12 9V2"/><path d="M4.22 10.22l1.42 1.42M18.36 10.22l-1.42 1.42M1 18h22"/></svg>`,
  Connection: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`,
  Clarity:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`,
  Acceptance: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`,
  Ambition:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M3 20l5.5-5.5"/><path d="M14.5 3.5l6 6"/><path d="M21 3l-7 7"/><circle cx="14" cy="14" r="7"/></svg>`,
  Gratitude:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  Mystery:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M12 3a6 6 0 016 6c0 3-2 4-3.5 5.5S12 17 12 19"/><circle cx="12" cy="22" r=".5" fill="currentColor"/></svg>`,
};

// SVG mandala for card back
const MANDALA_SVG = `<svg class="card-mandala" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.5">
  <circle cx="50" cy="50" r="42" opacity="0.3"/>
  <circle cx="50" cy="50" r="30" opacity="0.25"/>
  <circle cx="50" cy="50" r="18" opacity="0.3"/>
  <circle cx="50" cy="50" r="6" opacity="0.4"/>
  ${Array.from({length: 12}, (_, i) => {
    const a = i * 30 * Math.PI / 180;
    const x1 = 50 + 6 * Math.cos(a), y1 = 50 + 6 * Math.sin(a);
    const x2 = 50 + 42 * Math.cos(a), y2 = 50 + 42 * Math.sin(a);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" opacity="0.2"/>`;
  }).join('')}
  ${Array.from({length: 6}, (_, i) => {
    const a = i * 60 * Math.PI / 180;
    const x = 50 + 24 * Math.cos(a), y = 50 + 24 * Math.sin(a);
    return `<circle cx="${x}" cy="${y}" r="3" opacity="0.2"/>`;
  }).join('')}
  ${Array.from({length: 8}, (_, i) => {
    const a = (i * 45 + 22.5) * Math.PI / 180;
    const x = 50 + 36 * Math.cos(a), y = 50 + 36 * Math.sin(a);
    return `<path d="M${x-2},${y} L${x},${y-2} L${x+2},${y} L${x},${y+2}Z" opacity="0.25"/>`;
  }).join('')}
</svg>`;
const CARD_COUNT = ANSWERS.length;

// State
let state = 'deck'; // deck | shuffling | fanned | picking | returning
let cards = [];
let cardEls = [];
let pickedIndex = -1;
let deckOrder = []; // shuffled indices

const stage = document.getElementById('cardStage');
const shuffleBtn = document.getElementById('shuffleBtn');

// --- Card creation ---
function createCardEl(index) {
  const answer = ANSWERS[index];
  const sym = SYMBOLS[index % SYMBOLS.length];
  const num = String(index + 1).padStart(2, '0');
  const isBlack = answer.symbol === '♠' || answer.symbol === '♣';

  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.dataset.index = index;

  wrapper.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back${isBlack ? ' card-back-orange' : ''}">
        <span class="card-corner tl">${answer.symbol}</span>
        ${MANDALA_SVG}
        <span class="card-corner br">${answer.symbol}</span>
      </div>
      <div class="card-face card-front">
        <span class="card-front-symbol">${CATEGORY_ICONS[answer.category] || sym}</span>
        <span class="card-category">${answer.category}</span>
        <span class="card-answer">"${answer.answer}"</span>
      </div>
    </div>
  `;

  wrapper.addEventListener('click', () => onCardClick(index));
  return wrapper;
}

function init() {
  // Create all card elements
  for (let i = 0; i < CARD_COUNT; i++) {
    const el = createCardEl(i);
    stage.appendChild(el);
    cardEls.push(el);
    deckOrder.push(i);
  }
  // Position as deck
  positionAsDeck(false);
  initSnow();
}

// --- Deck position (stacked center) ---
function positionAsDeck(animate) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));

  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const offsetY = -order * 0.4;
    const offsetX = (Math.random() - 0.5) * 1.5;
    const rot = (Math.random() - 0.5) * 2;

    el.classList.remove('flipped', 'picking');
    el.style.zIndex = order;
    el.style.transition = animate ? `transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) ${order * 15}ms` : 'none';
    el.style.transform = `translate(${cx - cw/2 + offsetX}px, ${cy - ch/2 + offsetY}px) rotate(${rot}deg)`;
    el.style.opacity = '1';
    el.style.pointerEvents = 'none';
  });

  state = 'deck';
}

// --- Shuffle animation ---
// --- Sound effects (Web Audio API, no external files) ---
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playShuffleSound() {
  const ctx = getAudioCtx();
  // Rapid soft clicks to simulate card riffle
  for (let i = 0; i < 8; i++) {
    const t = ctx.currentTime + i * 0.06;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 2000 + Math.random() * 2000;
    osc.type = 'triangle';
    osc.frequency.value = 800 + Math.random() * 600;
    gain.gain.setValueAtTime(0.03, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    osc.connect(filter).connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.04);
  }
}

function playFlipSound() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.15);
}

function playRevealChime() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  [523, 659, 784].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const start = t + i * 0.12;
    gain.gain.setValueAtTime(0.04, start);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(start);
    osc.stop(start + 0.5);
  });
}

function shuffleDeck() {
  if (state === 'shuffling') return;
  state = 'shuffling';
  playShuffleSound();
  shuffleBtn.classList.add('disabled');

  // If fanned, gather back first
  if (pickedIndex >= 0) {
    // Close picked card first
    cardEls[pickedIndex].classList.remove('flipped', 'picking');
    pickedIndex = -1;
  }

  const gatherDuration = state === 'deck' ? 0 : 500;

  // Gather cards to center
  positionAsDeck(true);

  setTimeout(() => {
    doRiffles(0, 3, () => {
      // Shuffle the order
      for (let i = deckOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deckOrder[i], deckOrder[j]] = [deckOrder[j], deckOrder[i]];
      }
      // Fan out
      setTimeout(() => fanOut(), 200);
    });
  }, gatherDuration + 300);
}

function doRiffles(count, total, callback) {
  if (count >= total) { callback(); return; }

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
  const half = Math.floor(CARD_COUNT / 2);

  // Split left/right
  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const isLeft = order < half;
    const spread = isLeft ? -60 : 60;
    const lift = -20 - Math.random() * 10;
    const rot = isLeft ? -8 : 8;

    el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1)';
    el.style.transform = `translate(${cx - cw/2 + spread}px, ${cy - ch/2 + lift}px) rotate(${rot}deg)`;
  });

  // Interleave back
  setTimeout(() => {
    // Interleave deckOrder
    const left = deckOrder.slice(0, half);
    const right = deckOrder.slice(half);
    const merged = [];
    let li = 0, ri = 0;
    while (li < left.length || ri < right.length) {
      if (ri < right.length) merged.push(right[ri++]);
      if (li < left.length) merged.push(left[li++]);
    }
    deckOrder.length = 0;
    merged.forEach(v => deckOrder.push(v));

    cardEls.forEach((el, i) => {
      const order = deckOrder.indexOf(i);
      const offsetY = -order * 0.4;
      el.style.zIndex = order;
      el.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1)';
      el.style.transform = `translate(${cx - cw/2}px, ${cy - ch/2 + offsetY}px) rotate(${(Math.random()-0.5)*2}deg)`;
    });

    setTimeout(() => doRiffles(count + 1, total, callback), 220);
  }, 200);
}

// --- Orbit ring ---
let orbitAngle = 0; // current rotation in radians
let orbitRAF = null;
const ORBIT_SPEED = 0.12; // radians per second — slow, meditative

function getOrbitParams() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));
  // Ellipse: wide, slightly tilted for perspective
  const isMobile = w <= 768;
  const rx = isMobile ? w * 0.62 : Math.min(w * 0.36, 480);
  const ry = rx * (isMobile ? 0.38 : 0.32);
  const cx = w / 2 - cw / 2;
  const cy = h / 2 - ch / 2 - 10;
  return { rx, ry, cx, cy, cw, ch };
}

function cardOrbitPos(order, n, angle, params) {
  const theta = angle + (order / n) * Math.PI * 2;
  const x = params.cx + Math.cos(theta) * params.rx;
  const y = params.cy + Math.sin(theta) * params.ry;
  const depth = Math.sin(theta); // -1 (back) to 1 (front)
  const scale = 0.75 + depth * 0.25;
  const rot = Math.cos(theta) * -6;
  const z = Math.round((depth + 1) * 100);
  return { x, y, scale, rot, z, depth };
}

function fanOut() {
  orbitAngle = 0;
  state = 'fanned';
  shuffleBtn.classList.remove('disabled');

  // Initial position with transition
  const params = getOrbitParams();
  cardEls.forEach((el, i) => {
    const order = deckOrder.indexOf(i);
    const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);
    el.style.transition = `transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${order * 20}ms, opacity 0.4s ease`;
    el.style.zIndex = pos.z;
    el.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${pos.rot}deg) scale(${pos.scale})`;
    el.style.opacity = '1';
    el.style.pointerEvents = 'auto';
  });

  // Start orbit after transition settles
  setTimeout(() => startOrbit(), 900);
}

function startOrbit() {
  if (orbitRAF) cancelAnimationFrame(orbitRAF);
  let lastTime = performance.now();

  function tick(now) {
    if (state !== 'fanned') return;
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    orbitAngle += dt * ORBIT_SPEED;

    const params = getOrbitParams();
    cardEls.forEach((el, i) => {
      if (i === pickedIndex) return;
      const order = deckOrder.indexOf(i);
      const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);
      el.style.transition = 'none';
      el.style.zIndex = pos.z;
      el.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${pos.rot}deg) scale(${pos.scale})`;
      el.style.filter = `drop-shadow(0 ${4 + pos.depth * 8}px ${10 + pos.depth * 12}px rgba(0,0,0,${(0.25 + pos.depth * 0.2).toFixed(2)}))`;
      el.style.opacity = '1';
    });

    orbitRAF = requestAnimationFrame(tick);
  }
  orbitRAF = requestAnimationFrame(tick);
}

// --- Card interaction ---
function onCardClick(index) {
  if (state === 'fanned' && pickedIndex < 0) {
    pickCard(index);
  } else if (state === 'fanned' && pickedIndex === index) {
    // Flip the picked card
    cardEls[index].classList.toggle('flipped');
  } else if (state === 'fanned' && pickedIndex >= 0 && pickedIndex !== index) {
    // Put back current, pick new
    putBackCard(() => pickCard(index));
  }
}

function pickCard(index) {
  pickedIndex = index;
  state = 'fanned'; // still fanned, just one is picked

  const el = cardEls[index];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const ch = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h'));

  // Scale up and center — reparent to body so it's above the blur overlay
  const maxW = window.innerWidth * 0.8;
  const maxH = window.innerHeight * 0.7;
  const scale = Math.min(maxW / cw, maxH / ch, 2.5);

  // Capture current orbit position before reparenting
  const rect = el.getBoundingClientRect();
  document.body.appendChild(el);
  el.classList.add('picking');
  el.style.zIndex = 600;
  el.style.position = 'fixed';
  el.style.filter = 'none';
  el.style.opacity = '1';
  el.style.left = '0';
  el.style.top = '0';
  // Set to current orbit position instantly (no transition)
  el.style.transition = 'none';
  el.style.transform = `translate(${rect.left}px, ${rect.top}px) scale(1) rotate(0deg)`;

  // Show overlay
  const overlay = document.getElementById('pickOverlay');
  overlay.classList.add('active');
  document.getElementById('cardStage').style.visibility = 'hidden';

  // Animate to center on next frame using scale, then swap to zoom for crisp text
  const tilt = (Math.random() - 0.5) * 12; // -6° to +6°
  requestAnimationFrame(() => {
    el.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
    el.style.transform = `translate(${cx - cw/2}px, ${cy - ch/2}px) scale(${scale}) rotate(${tilt}deg)`;

    // After animation ends, swap scale() for CSS zoom — re-rasterizes text crisply
    setTimeout(() => {
      el.style.transition = 'none';
      el.style.zoom = scale;
      const tx = Math.round((cx - cw*scale/2) / scale);
      const ty = Math.round((cy - ch*scale/2) / scale);
      el.style.transform = `translate(${tx}px, ${ty}px) rotate(${tilt}deg)`;
    }, 650);
  });

  // Dim other cards
  cardEls.forEach((other, i) => {
    if (i !== index) {
      other.style.pointerEvents = 'none';
    }
  });

  // Auto-flip after pop
  setTimeout(() => {
    el.classList.add('flipped');
    playFlipSound();
    setTimeout(playRevealChime, 300);
  }, 350);

  // Click outside to close
  const closeHandler = (e) => {
    if (el.contains(e.target)) return;
    document.removeEventListener('click', closeHandler);
    putBackCard();
  };
  setTimeout(() => {
    document.addEventListener('click', closeHandler);
    document.getElementById('pickOverlay').onclick = () => {
      document.removeEventListener('click', closeHandler);
      putBackCard();
    };
  }, 100);
}

function putBackCard(callback) {
  if (pickedIndex < 0) { if (callback) callback(); return; }

  const el = cardEls[pickedIndex];
  const order = deckOrder.indexOf(pickedIndex);
  const params = getOrbitParams();
  const pos = cardOrbitPos(order, CARD_COUNT, orbitAngle, params);

  el.classList.remove('flipped', 'picking');
  el.style.position = 'absolute';
  el.style.width = '';
  el.style.height = '';
  el.style.filter = '';
  el.style.left = '';
  el.style.top = '';
  el.style.zoom = '';
  // Reparent back to stage
  document.getElementById('cardStage').appendChild(el);
  el.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
  el.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${pos.rot}deg) scale(${pos.scale})`;
  el.style.zIndex = pos.z;

  // Restore other cards
  document.getElementById('pickOverlay').classList.remove('active');
  document.getElementById('cardStage').style.visibility = 'visible';
  cardEls.forEach((other) => {
    other.style.pointerEvents = 'auto';
  });

  pickedIndex = -1;

  setTimeout(() => { if (callback) callback(); }, 500);
}

// --- Site intro ---
const siteIntro = document.getElementById('siteIntro');
setTimeout(() => siteIntro.classList.add('visible'), 300);

// --- Shuffle button ---
shuffleBtn.addEventListener('click', () => {
  // Fade out intro on first shuffle
  if (siteIntro.classList.contains('visible')) {
    siteIntro.classList.remove('visible');
    setTimeout(() => { siteIntro.style.display = 'none'; }, 1500);
  }
  if (pickedIndex >= 0) {
    putBackCard(() => setTimeout(shuffleDeck, 200));
  } else {
    shuffleDeck();
  }
});

// --- Resize ---
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state === 'fanned') {
      // Orbit auto-adapts via getOrbitParams() each frame
    } else if (state === 'deck') {
      positionAsDeck(false);
    }
  }, 200);
});

// --- Snow shader (same as before) ---
function initSnow() {
  const container = document.getElementById('snowCanvas');
  const { Scene, OrthographicCamera, WebGLRenderer, PlaneGeometry, ShaderMaterial, Mesh, Vector2 } = THREE;

  const scene = new Scene();
  const camera = new OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const renderer = new WebGLRenderer({ antialias: false, alpha: true, premultipliedAlpha: false, powerPreference: 'high-performance', stencil: false, depth: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
  const fragmentShader = `
precision mediump float;
out vec4 fragColor;
uniform float uTime;
uniform vec2 uResolution;
uniform float uFlakeSize;
uniform float uMinFlakeSize;
uniform float uPixelResolution;
uniform float uSpeed;
uniform float uDepthFade;
uniform float uFarPlane;
uniform vec3 uColor;
uniform float uBrightness;
uniform float uGamma;
uniform float uDensity;
uniform float uDirection;

#define PI 3.14159265
#define M1 1597334677U
#define M2 3812015801U
#define M3 3299493293U
#define F0 2.3283064e-10
#define hash(n) (n * (n ^ (n >> 15)))
#define coord3(p) (uvec3(p).x * M1 ^ uvec3(p).y * M2 ^ uvec3(p).z * M3)

const vec3 camK = vec3(0.57735027, 0.57735027, 0.57735027);
const vec3 camI = vec3(0.70710678, 0.0, -0.70710678);
const vec3 camJ = vec3(-0.40824829, 0.81649658, -0.40824829);

vec3 hash3(uint n) {
  uvec3 hashed = hash(n) * uvec3(1U, 511U, 262143U);
  return vec3(hashed) * F0;
}

void main() {
  float invPixelRes = 1.0 / uPixelResolution;
  float pixelSize = max(1.0, floor(0.5 + uResolution.x * invPixelRes));
  float invPixelSize = 1.0 / pixelSize;
  vec2 fragCoord = floor(gl_FragCoord.xy * invPixelSize);
  vec2 res = uResolution * invPixelSize;
  float invResX = 1.0 / res.x;
  vec3 ray = normalize(vec3((fragCoord - res * 0.5) * invResX, 1.0));
  ray = ray.x * camI + ray.y * camJ + ray.z * camK;
  float timeSpeed = uTime * uSpeed;
  float windX = cos(uDirection) * 0.4;
  float windY = sin(uDirection) * 0.4;
  vec3 camPos = (windX * camI + windY * camJ + 0.1 * camK) * timeSpeed;
  vec3 pos = camPos;
  vec3 absRay = max(abs(ray), vec3(0.001));
  vec3 strides = 1.0 / absRay;
  vec3 raySign = step(ray, vec3(0.0));
  vec3 phase = fract(pos) * strides;
  phase = mix(strides - phase, phase, raySign);
  float rayDotCamK = dot(ray, camK);
  float invRayDotCamK = 1.0 / rayDotCamK;
  float invDepthFade = 1.0 / uDepthFade;
  float halfInvResX = 0.5 * invResX;
  vec3 timeAnim = timeSpeed * 0.1 * vec3(7.0, 8.0, 5.0);
  float t = 0.0;
  for (int i = 0; i < 128; i++) {
    if (t >= uFarPlane) break;
    vec3 fpos = floor(pos);
    uint cellCoord = coord3(fpos);
    float cellHash = hash3(cellCoord).x;
    if (cellHash < uDensity) {
      vec3 h = hash3(cellCoord);
      vec3 sinArg1 = fpos.yzx * 0.073;
      vec3 sinArg2 = fpos.zxy * 0.27;
      vec3 flakePos = 0.5 - 0.5 * cos(4.0 * sin(sinArg1) + 4.0 * sin(sinArg2) + 2.0 * h + timeAnim);
      flakePos = flakePos * 0.8 + 0.1 + fpos;
      float toIntersection = dot(flakePos - pos, camK) * invRayDotCamK;
      if (toIntersection > 0.0) {
        vec3 testPos = pos + ray * toIntersection - flakePos;
        float testX = dot(testPos, camI);
        float testY = dot(testPos, camJ);
        vec2 testUV = abs(vec2(testX, testY));
        float depth = dot(flakePos - camPos, camK);
        float flakeSize = max(uFlakeSize, uMinFlakeSize * depth * halfInvResX);
        float dist = max(testUV.x, testUV.y);
        if (dist < flakeSize) {
          float flakeSizeRatio = uFlakeSize / flakeSize;
          float intensity = exp2(-(t + toIntersection) * invDepthFade) * min(1.0, flakeSizeRatio * flakeSizeRatio) * uBrightness;
          fragColor = vec4(uColor * pow(vec3(intensity), vec3(uGamma)), 1.0);
          return;
        }
      }
    }
    float nextStep = min(min(phase.x, phase.y), phase.z);
    vec3 sel = step(phase, vec3(nextStep));
    phase = phase - nextStep + strides * sel;
    t += nextStep;
    pos = mix(pos + ray * nextStep, floor(pos + ray * nextStep + 0.5), sel);
  }
  fragColor = vec4(0.0);
}`;

  const material = new ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uResolution: { value: new Vector2(window.innerWidth, window.innerHeight) },
      uFlakeSize: { value: 0.01 },
      uMinFlakeSize: { value: 1.25 },
      uPixelResolution: { value: 200 },
      uSpeed: { value: 1.25 },
      uDepthFade: { value: 8 },
      uFarPlane: { value: 20 },
      uColor: { value: new THREE.Vector3(0.91, 0.39, 0.12) },
      uBrightness: { value: 1 },
      uGamma: { value: 0.4545 },
      uDensity: { value: 0.3 },
      uDirection: { value: (125 * Math.PI) / 180 }
    },
    transparent: true,
    glslVersion: THREE.GLSL3
  });

  const geometry = new PlaneGeometry(2, 2);
  scene.add(new Mesh(geometry, material));

  const startTime = performance.now();
  function snowAnimate() {
    material.uniforms.uTime.value = (performance.now() - startTime) * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(snowAnimate);
  }
  snowAnimate();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  });
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && pickedIndex >= 0) {
    putBackCard();
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    shuffleBtn.click();
  }
});

init();
</script>
